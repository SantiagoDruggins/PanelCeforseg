    .dp-field.text-center .dp-field-inner{ justify-content:center; }
    .dp-field.justify .dp-field-inner{ justify-content:stretch; }

    .dp-adjust .dp-field{
      pointer-events:auto;
      border:1px dashed rgba(10,59,120,.55);
      background:rgba(255,255,255,.20);
      cursor:move;

      .dp-preview-wrap{
        box-shadow:none !important;
        border-radius:0 !important;
        width:210mm !important;
      }
    }
  </style>
</head>

  function formatFechaES(dateStr, { capitalizarMes } = {}) {
    if(!dateStr) return '';
    const d = new Date(dateStr + 'T12:00:00');
    if(isNaN(d.getTime())) return dateStr;
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const mes = meses[d.getMonth()];
    const mesOut = capitalizarMes ? (mes.charAt(0).toUpperCase() + mes.slice(1)) : mes;
    return `${d.getDate()} de ${mesOut} del ${d.getFullYear()}`;
  }

  function formatRangoDesdeHasta(desdeStr, hastaStr) {
    if(!desdeStr || !hastaStr) return '';
    const d1 = new Date(desdeStr + 'T12:00:00');
    const d2 = new Date(hastaStr + 'T12:00:00');
    if(isNaN(d1.getTime()) || isNaN(d2.getTime())) return '';
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    // Asumimos que el mes y año son iguales como en tu ejemplo (desde 13 al 20 de agosto del 2025)
    const mes = meses[d1.getMonth()];
    const año = d1.getFullYear();
    return `${d1.getDate()} al ${d2.getDate()} de ${mes} del ${año}`;
  }

  function aplicarTemplateTexto(template, vars){
    return String(template || '').replace(/\{([A-Z_]+)\}/g, (_, key) => {
      return (vars[key] ?? '');
    });
  }

  function getBaseFontSizePx(key){
    if(!dpi) return 14;
    const fromPos = dpi.positions?.[key]?.fontSize || dpi.defaultPos?.[key]?.fontSize || '14px';
    const n = Number(String(fromPos).replace(/[^0-9.]/g, ''));
    return Number.isFinite(n) && n > 0 ? n : 14;
  }

  function ajustarTextoCampo(key){
    const el = dpi?.overlayEls?.[key];
    if(!el) return;
    const inner = el.querySelector('.dp-field-inner');
    if(!inner) return;

    const base = getBaseFontSizePx(key);
    let current = base;
    el.style.fontSize = current + 'px';

    // Reduce tamaño de fuente hasta que el texto quepa en el recuadro.
    const min = 9;
    while(current > min && (inner.scrollHeight > el.clientHeight || inner.scrollWidth > el.clientWidth)){
      current -= 0.5;
      el.style.fontSize = current + 'px';
    }
  }

  let dpi = null;
  function buildTemplateKeyFromFile(file){
    if(!file) return '';
    return `local:${file.name}:${file.size}:${file.lastModified}`;
  }

  function initDiplomaEngine(){
    const previewWrap = document.getElementById('previewWrap');
    const canvas = document.getElementById('pdfCanvas');
    const overlayLayer = document.getElementById('overlayLayer');
    const msgPos = document.getElementById('msgPos');

    // POS por defecto (aprox). Si no calza con tu plantilla, se ajusta en modo arrastrar.
    const defaultPos = {
      nombre:   { x: 18, y: 6,  w: 64, h: 10, align: 'center', fontSize: '18px', fontWeight: 900 },
      foto:     { x: 8.5, y: 25, w: 9.5, h: 18, align: 'left', fontSize: '12px', fontWeight: 700 },
      cedula:   { x: 28, y: 16, w: 44, h: 6,  align: 'center', fontSize: '13px', fontWeight: 800 },
      ciudad:   { x: 26, y: 22, w: 48, h: 6,  align: 'center', fontSize: '13px', fontWeight: 800 },
      aprobo:   { x: 26, y: 26.5, w: 48, h: 6, align: 'center', fontSize: '13px', fontWeight: 800 },
      curso:    { x: 8,  y: 30, w: 84, h: 15, align: 'center', fontSize: '28px', fontWeight: 900 },
      interno:  { x: 17, y: 51, w: 55, h: 6,  align: 'left',   fontSize: '14px', fontWeight: 800 },
      rango:    { x: 17, y: 57, w: 55, h: 7,  align: 'left',   fontSize: '14px', fontWeight: 800 },
      folio:    { x: 70, y: 51, w: 22, h: 6,  align: 'left',   fontSize: '14px', fontWeight: 900 },
      expedido: { x: 15, y: 64, w: 70, h: 7,  align: 'left',   fontSize: '14px', fontWeight: 800 },
      horas:    { x: 61, y: 74, w: 30, h: 7,  align: 'left',   fontSize: '14px', fontWeight: 800 }
    };

    const fields = [
      { key:'nombre', input:'in_nombre' },
      { key:'cedula', input:'in_cedula' },
      { key:'ciudad', input:'in_ciudad' },
      { key:'aprobo', input:null },
      { key:'curso', input:'in_curso' },
      { key:'interno', input:null },
      { key:'rango', input:null },
      { key:'folio', input:'in_folio' },
      { key:'expedido', input:null },
      { key:'horas', input:'in_horas' }
    ];

    // Crea overlays
    overlayLayer.innerHTML = '';
    const overlayEls = {};
    Object.keys(defaultPos).forEach(k => {
      const p = defaultPos[k];
      const el = document.createElement('div');
      el.className = 'dp-field';
      if(p.align === 'center') el.classList.add('center');
      if(p.align === 'justify') el.classList.add('justify');
      if(p.align === 'left') el.classList.add('text-left');
      el.id = 'dpField_' + k;
      el.dataset.key = k;
      overlayLayer.appendChild(el);
      overlayEls[k] = el;
      applyPosToEl(el, p);
      if(k === 'foto'){
        el.classList.add('dp-foto-field');
        el.innerHTML = `<img class="dp-foto-img" id="dpFotoImg" alt="Foto diploma">`;
      }else{
        el.style.fontSize = p.fontSize || '14px';
        el.style.fontWeight = p.fontWeight || 800;
        el.style.textAlign = (p.align === 'center') ? 'center' : 'left';
        el.innerHTML = `<div class="dp-field-inner"></div>`;
      }
    });

    // Engine state
    dpi = {
      previewWrap,
      canvas,
      overlayLayer,
      overlayEls,
      defaultPos,
      positions: null,
      dragMode: false,
      templateUrl: null,
      templateKey: '',
      fotoUrl: '',
      msgPos
    };

    // Setup listeners de inputs para "autocompletar"
    const applyFromInputs = () => {
      if(!dpi) return;
      aplicarDatos(false);
    };
    ['in_nombre','in_cedula','in_ciudad','in_curso','in_folio','in_horas','in_ciudad_expedicion','tpl_texto_aprobo','tpl_texto_cedula','tpl_texto_ciudad','tpl_texto_interno','tpl_texto_folio','tpl_texto_horas','tpl_texto_rango','tpl_texto_expedido'].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.addEventListener('input', applyFromInputs);
    });
    ['in_fecha_desde','in_fecha_hasta','in_fecha_expedicion','in_interno_letra','in_interno_num','in_ciudad_expedicion'].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.addEventListener('change', applyFromInputs);
    });

    const tplInput = document.getElementById('tplFile');
    if(tplInput){
      tplInput.addEventListener('change', async () => {
        const file = tplInput.files?.[0];
        const msgPreview = document.getElementById('msgPreview');
        if(!file) return;
        try{
          dpi.templateKey = buildTemplateKeyFromFile(file);
          document.getElementById('tplActual').textContent = file.name + ' (preview local)';
          await renderPdf(file);
          loadPosicionesForTemplate();
          aplicarDatos(false);
          if(msgPreview) msgPreview.textContent = 'Vista previa local lista. Si quieres guardarla en servidor, pulsa "Subir plantilla".';
        }catch(err){
          if(msgPreview) msgPreview.textContent = 'No se pudo mostrar el PDF en vista previa.';
          alert('No se pudo renderizar el PDF seleccionado.');
        }
      });
    }

    const fotoInput = document.getElementById('fotoFile');
    if(fotoInput){
      fotoInput.addEventListener('change', async () => {
        const file = fotoInput.files?.[0];
        if(!file) return;
        const localUrl = URL.createObjectURL(file);
        setFoto(localUrl);
        document.getElementById('fotoActual').textContent = file.name + ' (preview local)';
      });
    }
  }

  function applyPosToEl(el, pos){
    // pos: x/y/w/h en %
    el.style.left = pos.x + '%';
    el.style.top = pos.y + '%';
    el.style.width = pos.w + '%';
    el.style.height = pos.h + '%';
  }

  async function subirPlantilla(){
    const fileInput = document.getElementById('tplFile');
    const file = fileInput?.files?.[0];
    if(!file){
      alert('Selecciona un PDF como plantilla.');
      return;
    }

    const btn = document.querySelector('button[onclick="subirPlantilla()"]');
    if(btn) btn.disabled = true;

    const fd = new FormData();
    fd.append('pdf', file);

    try{
      const res = await fetch('/api/diplomas/plantillas', {
        method:'POST',
        headers:{ Authorization:'Bearer ' + token },
        body: fd
      });
      const data = await res.json();
      if(!res.ok){
        alert(data.mensaje || 'Error al subir plantilla');
        return;
      }

      document.getElementById('tplActual').textContent = file.name;
      dpi.templateUrl = data.url;
      dpi.templateKey = data.url;
      dpi.msgPos.textContent = 'Plantilla cargada. Rendering PDF...';
      await renderPdf(data.url);
      loadPosicionesForTemplate();
      aplicarDatos(true);
      dpi.msgPos.textContent = 'Listo. Completa datos y / o ajusta POS si hace falta.';
    }finally{
      if(btn) btn.disabled = false;
    }
  }

  async function subirFotoDiploma(){
    const fileInput = document.getElementById('fotoFile');
    const file = fileInput?.files?.[0];
    if(!file){
      alert('Selecciona una foto.');
      return;
    }
    const fd = new FormData();
    fd.append('foto', file);

    const res = await fetch('/api/diplomas/fotos', {
      method:'POST',
      headers:{ Authorization:'Bearer ' + token },
      body: fd
    });
    const data = await res.json();
    if(!res.ok){
      alert(data.mensaje || 'Error subiendo foto');
      return;
    }
    setFoto(data.url);
    document.getElementById('fotoActual').textContent = file.name;
  }

  function setFoto(url){
    const img = document.getElementById('dpFotoImg');
    if(!img) return;
    img.src = url || '';
    dpi.fotoUrl = url || '';
  }

  async function renderPdf(source){
    if(!dpi) return;
    const wrap = dpi.previewWrap;
    const canvas = dpi.canvas;
    const msgPreview = document.getElementById('msgPreview');

    const pdfjsLib = window['pdfjsLib'];
    if(!pdfjsLib){
      throw new Error('pdfjsLib no cargado');
    }
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    wrap.style.height = '';
    wrap.style.width = '210mm';

    let loading;
    if(typeof source === 'string'){
      loading = pdfjsLib.getDocument(source);
    }else{
      const bytes = new Uint8Array(await source.arrayBuffer());
      loading = pdfjsLib.getDocument({ data: bytes });
    }
    const doc = await loading.promise;
    const page = await doc.getPage(1);

    // Calcular escala para que el ancho del PDF encaje con el wrapper (210mm aprox)
    const targetWidth = wrap.getBoundingClientRect().width;
    const unscaledViewport = page.getViewport({ scale: 1 });
    const scale = targetWidth / unscaledViewport.width;

    const viewport = page.getViewport({ scale });

    canvas.width = viewport.width;
    canvas.height = viewport.height;
    canvas.style.height = viewport.height + 'px';

    // Mantener el layout: el canvas al 100% del wrapper
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;

    wrap.style.height = viewport.height + 'px';
    if(msgPreview) msgPreview.textContent = `Plantilla renderizada (página 1).`;
  }

  function loadPosicionesForTemplate(){
    if(!dpi) return;
    const templateRef = dpi.templateKey || dpi.templateUrl || '__default__';
    const key = 'dp_positions_' + templateRef;
    const saved = localStorage.getItem(key);
    dpi.positions = null;
    if(saved){
      try{
        dpi.positions = JSON.parse(saved);
      }catch(_){}
    }
    const positionsToUse = dpi.positions || dpi.defaultPos;
    Object.keys(dpi.overlayEls).forEach(k => {
      if(!positionsToUse[k]) return;
      applyPosToEl(dpi.overlayEls[k], positionsToUse[k]);
      dpi.overlayEls[k].style.fontSize = positionsToUse[k].fontSize || dpi.defaultPos[k].fontSize;
      dpi.overlayEls[k].style.fontWeight = positionsToUse[k].fontWeight || dpi.defaultPos[k].fontWeight;
      dpi.overlayEls[k].style.textAlign = (positionsToUse[k].align === 'center') ? 'center' : 'left';
    });
  }

  function toggleAjustePos(){
    if(!dpi) return;
    dpi.dragMode = !dpi.dragMode;
    dpi.overlayLayer.closest('.dp-preview-wrap').classList.toggle('dp-adjust', dpi.dragMode);
    const btn = document.getElementById('btnAjustePos');
    if(btn) btn.className = dpi.dragMode ? 'btn btn-primary' : 'btn btn-outline-primary';
    if(btn) btn.innerHTML = dpi.dragMode
      ? '<i class="bi bi-arrows-move me-1"></i>Ajustando POS... (arrastra)'
      : '<i class="bi bi-arrows-move me-1"></i>Modo ajuste POS';
    if(dpi.dragMode) enableDrag();
  }

  function enableDrag(){
    if(!dpi || !dpi.dragMode) return;
    const wrap = dpi.previewWrap;
    const overlay = dpi.overlayLayer;

    // Deshabilitar listeners duplicados si se activa varias veces
    overlay.querySelectorAll('.dp-field').forEach(el => {
      el.onpointerdown = null;
    });

    overlay.querySelectorAll('.dp-field').forEach(el => {
      el.onpointerdown = (ev) => {
        ev.preventDefault();
        if(!dpi.dragMode) return;

        const startX = ev.clientX;
        const startY = ev.clientY;

        const wrapRect = wrap.getBoundingClientRect();
        const elRect = el.getBoundingClientRect();

        const startLeftPx = elRect.left - wrapRect.left;
        const startTopPx = elRect.top - wrapRect.top;

        const move = (e2) => {
          const dx = e2.clientX - startX;
          const dy = e2.clientY - startY;

          const leftPx = Math.max(0, startLeftPx + dx);
          const topPx = Math.max(0, startTopPx + dy);

          const leftPct = (leftPx / wrapRect.width) * 100;
          const topPct = (topPx / wrapRect.height) * 100;

          el.style.left = leftPct + '%';
          el.style.top = topPct + '%';
        };

        const up = () => {
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
          actualizarPositionsDesdeDOM();
        };

        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up, { once:true });
      };
    });
  }

  function actualizarPositionsDesdeDOM(){
    if(!dpi) return;
    const wrapRect = dpi.previewWrap.getBoundingClientRect();
    const next = Object.assign({}, dpi.defaultPos);
    Object.keys(dpi.overlayEls).forEach(k => {
      const el = dpi.overlayEls[k];
      const elRect = el.getBoundingClientRect();
      const leftPct = ((elRect.left - wrapRect.left) / wrapRect.width) * 100;
      const topPct = ((elRect.top - wrapRect.top) / wrapRect.height) * 100;
      const widthPct = (elRect.width / wrapRect.width) * 100;
      const heightPct = (elRect.height / wrapRect.height) * 100;
      next[k] = {
        x: leftPct,
        y: topPct,
        w: widthPct,
        h: heightPct,
        align: dpi.defaultPos[k]?.align,
        fontSize: el.style.fontSize || dpi.defaultPos[k]?.fontSize,
        fontWeight: el.style.fontWeight ? Number(el.style.fontWeight.replace(/[^0-9]/g,'')) : (dpi.defaultPos[k]?.fontWeight || 800)
      };
    });
    dpi.positions = next;
  }

  function guardarPosiciones(){
    if(!dpi || (!dpi.templateKey && !dpi.templateUrl)){
      alert('Primero selecciona una plantilla PDF.');
      return;
    }
    if(!dpi.positions) actualizarPositionsDesdeDOM();
    const templateRef = dpi.templateKey || dpi.templateUrl;
    const key = 'dp_positions_' + templateRef;
    localStorage.setItem(key, JSON.stringify(dpi.positions || dpi.defaultPos));
    dpi.msgPos.textContent = 'Posiciones guardadas para esta plantilla (localStorage).';
  }

  function resetPosiciones(){
    if(!dpi) return;
    dpi.positions = null;
    loadPosicionesForTemplate(dpi.templateUrl || '__none__');
    dpi.msgPos.textContent = 'Posiciones restablecidas (por defecto) para esta plantilla.';
  }

  function aplicarDatos(showMsg){
    if(!dpi) return;
    // Interno y rango se derivan de campos de fecha / letra / num
    const internoLetra = (document.getElementById('in_interno_letra')?.value || '').trim();
    const internoNum = (document.getElementById('in_interno_num')?.value || '').trim();
    const rangoDesde = document.getElementById('in_fecha_desde')?.value || '';
    const rangoHasta = document.getElementById('in_fecha_hasta')?.value || '';
    const folio = (document.getElementById('in_folio')?.value || '').trim();
    const horas = (document.getElementById('in_horas')?.value || '').trim();

    const nombre = document.getElementById('in_nombre')?.value || '';
    const cedula = document.getElementById('in_cedula')?.value || '';
    const ciudad = document.getElementById('in_ciudad')?.value || '';
    const curso = document.getElementById('in_curso')?.value || '';

    const ciudadExp = document.getElementById('in_ciudad_expedicion')?.value || '';
    const fechaExp = document.getElementById('in_fecha_expedicion')?.value || '';
    const tplAprobo = document.getElementById('tpl_texto_aprobo')?.value || 'Asistió y Aprobó El:';
    const tplCedula = document.getElementById('tpl_texto_cedula')?.value || 'Con Cédula de ciudadanía No. {CEDULA}';
    const tplCiudad = document.getElementById('tpl_texto_ciudad')?.value || 'De {CIUDAD}.';
    const tplInterno = document.getElementById('tpl_texto_interno')?.value || 'NUMERO INTERNO N.° {INTERNO}';
    const tplFolio = document.getElementById('tpl_texto_folio')?.value || 'FOLIO N° {FOLIO}';
    const tplHoras = document.getElementById('tpl_texto_horas')?.value || 'Con una Intensidad teórica práctica de: {HORAS} Horas';
    const tplRango = document.getElementById('tpl_texto_rango')?.value || '{RANGO}';
    const tplExpedido = document.getElementById('tpl_texto_expedido')?.value || 'Expedido en la ciudad de {CIUDAD_EXP} el {FECHA_EXP_LARGA}';

    const internoFull = [internoLetra, internoNum].filter(Boolean).join(' ').trim();
    const rangoFull = formatRangoDesdeHasta(rangoDesde, rangoHasta);
    const fechaExpLarga = fechaExp ? formatFechaES(fechaExp, { capitalizarMes: true }) : '';

    const vars = {
      NOMBRE: nombre,
      CEDULA: cedula,
      CIUDAD: ciudad,
      CURSO: curso,
      INTERNO: internoFull,
      RANGO: rangoFull,
      FOLIO: folio,
      HORAS: horas,
      CIUDAD_EXP: ciudadExp,
      FECHA_EXP_LARGA: fechaExpLarga
    };
    const cedulaFinal = aplicarTemplateTexto(tplCedula, vars).trim();
    const ciudadFinal = aplicarTemplateTexto(tplCiudad, vars).trim();
    const internoFinal = aplicarTemplateTexto(tplInterno, vars).trim();
    const folioFinal = aplicarTemplateTexto(tplFolio, vars).trim();
    const horasFinal = aplicarTemplateTexto(tplHoras, vars).trim();
    const textoRango = aplicarTemplateTexto(tplRango, vars).trim();
    const textoExpedido = aplicarTemplateTexto(tplExpedido, vars).trim();

    setFieldText('nombre', nombre || '—');
    setFieldText('cedula', cedulaFinal);
    setFieldText('ciudad', ciudadFinal);
    setFieldText('aprobo', tplAprobo || '—');
    setFieldText('curso', curso || '—');
    setFieldText('interno', internoFinal);
    setFieldText('rango', textoRango || '—');
    setFieldText('folio', folioFinal);
    setFieldText('expedido', textoExpedido || '—');
    setFieldText('horas', horasFinal);

    if(showMsg && dpi && dpi.msgPos) dpi.msgPos.textContent = 'Datos aplicados. Puedes imprimir.';
  }

  function setFieldText(key, text){
    const el = dpi?.overlayEls?.[key];
    if(!el) return;
    if(key === 'foto') return;
    const inner = el.querySelector('.dp-field-inner');
    if(inner){
      inner.textContent = text;
    }else{
      el.textContent = text;
    }
    ajustarTextoCampo(key);
  }
</script>

<script>
  // Exponer funciones globales para los onclick
  window.subirPlantilla = subirPlantilla;
  window.toggleAjustePos = toggleAjustePos;
  window.guardarPosiciones = guardarPosiciones;
  window.resetPosiciones = resetPosiciones;
  window.aplicarDatos = aplicarDatos;
  window.subirFotoDiploma = subirFotoDiploma;
</script>
