<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historial de Cierres</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<script>
if(!localStorage.getItem('token')) location.href='/login';
if(localStorage.getItem('rol') !== 'gerente') location.href='/dashboard';
</script>

<div id="app"></div>

<script>
const token = localStorage.getItem('token');

fetch('/layout.html')
.then(r => r.text())
.then(html => {
  document.getElementById('app').innerHTML = html;

  const content = document.querySelector('.content');

  content.innerHTML = `
    <h3 class="mb-4">📋 Historial de Cierres de Caja</h3>

    <div class="card shadow">
      <div class="card-body table-responsive">
        <table class="table table-bordered table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>Fecha</th>
              <th>Usuario</th>
              <th>Efectivo Sistema</th>
              <th>Nequi Sistema</th>
              <th>Total Sistema</th>
              <th>Efectivo Reportado</th>
              <th>Nequi Reportado</th>
              <th>Diferencia</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaCierres">
            <tr>
              <td colspan="9" class="text-center">Cargando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  `;

  cargarCierres();
});

async function cargarCierres(){
  const res = await fetch('/api/cierres-caja', {
    headers: { Authorization: 'Bearer ' + token }
  });

  const data = await res.json();
  const tbody = document.getElementById('tablaCierres');

  if(!data.length){
    tbody.innerHTML = `
      <tr>
        <td colspan="9" class="text-center text-muted">
          No hay cierres registrados
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = '';

  data.forEach(c => {
    const color =
      c.diferencia > 0 ? 'table-success' :
      c.diferencia < 0 ? 'table-danger' : '';

    const efRep = Number(c.efectivo_reportado || 0);
    const neRep = Number(c.nequi_reportado || 0);

    tbody.innerHTML += `
      <tr class="${color}">
        <td>${c.dia}</td>
        <td>${c.usuario}</td>
        <td>${typeof formatCOP === 'function' ? formatCOP(c.efectivo_sistema) : '$' + Number(c.efectivo_sistema).toLocaleString('es-CO') + ' COP'}</td>
        <td>${typeof formatCOP === 'function' ? formatCOP(c.nequi_sistema) : '$' + Number(c.nequi_sistema).toLocaleString('es-CO') + ' COP'}</td>
        <td><strong>${typeof formatCOP === 'function' ? formatCOP(c.total_sistema) : '$' + Number(c.total_sistema).toLocaleString('es-CO') + ' COP'}</strong></td>
        <td>${typeof formatCOP === 'function' ? formatCOP(efRep) : '$' + efRep.toLocaleString('es-CO') + ' COP'}</td>
        <td>${typeof formatCOP === 'function' ? formatCOP(neRep) : '$' + neRep.toLocaleString('es-CO') + ' COP'}</td>
        <td>
          <strong>
            ${typeof formatCOP === 'function' ? formatCOP(c.diferencia) : '$' + Number(c.diferencia).toLocaleString('es-CO') + ' COP'}
          </strong>
        </td>
        <td>
          <div class="d-flex gap-1 justify-content-center">
            <button class="btn btn-sm btn-outline-secondary" onclick="editarCierre(${c.id}, ${efRep}, ${neRep})">
              Editar
            </button>
            <button class="btn btn-sm btn-outline-danger" onclick="eliminarCierre(${c.id})">
              Eliminar
            </button>
          </div>
        </td>
      </tr>
    `;
  });
}

async function editarCierre(id, efectivoActual, nequiActual){
  const nuevoEf = prompt('Nuevo efectivo reportado:', efectivoActual);
  if(nuevoEf === null) return;

  const nuevoNe = prompt('Nuevo Nequi reportado:', nequiActual);
  if(nuevoNe === null) return;

  const res = await fetch('/api/cierres-caja/'+id, {
    method:'PUT',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+token
    },
    body: JSON.stringify({
      efectivo_reportado: nuevoEf,
      nequi_reportado: nuevoNe
    })
  });

  const data = await res.json();
  alert(data.mensaje || 'Cierre actualizado');
  if(res.ok) cargarCierres();
}

async function eliminarCierre(id){
  if(!confirm('¿Eliminar este cierre de caja?')) return;

  const res = await fetch('/api/cierres-caja/'+id, {
    method:'DELETE',
    headers:{ Authorization:'Bearer '+token }
  });

  const data = await res.json();
  alert(data.mensaje || 'Operación realizada');
  if(res.ok) cargarCierres();
}
</script>

</body>
</html>
