<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asignacion de codigos - CEFORSEG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body>
<script>
if(!localStorage.getItem('token')) location.href='/login';
if(!['gerente','aliado'].includes(localStorage.getItem('rol') || '')) location.href='/dashboard';
</script>

<div id="app"></div>

<script src="/permisos.js"></script>
<script>
const token = localStorage.getItem('token');
const rol = localStorage.getItem('rol') || '';
let codigos = [];
let aliados = [];
let modoUso = 'usar';

fetch('/layout.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('app').innerHTML = html;
    aplicarPermisosPanel();
    render();
    cargarInicial();
  });

function render(){
  const content = document.querySelector('.content');
  const esGerente = rol === 'gerente';

  content.innerHTML = `
    <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-4">
      <div>
        <h3 class="fw-bold mb-1"><i class="bi bi-upc-scan me-2"></i>Asignacion de codigos</h3>
        <p class="text-muted mb-0">Fundamentaciones usan NRO/NCI. Seminarios y diplomados usan Nro interno y folio.</p>
      </div>
      <span class="badge text-bg-primary mt-1">${esGerente ? 'Gerente' : 'Aliado'}</span>
    </div>

    ${esGerente ? `
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h6 class="mb-3">Asignar codigo a socio / aliado / comprador</h6>
          <form id="formAsignar">
            <div class="row g-3">
              <div class="col-md-3">
                <label class="form-label">Aliado</label>
                <select id="aliado_id" class="form-select" required><option value="">Cargando...</option></select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Tipo</label>
                <select id="tipo_codigo" class="form-select" onchange="toggleTipoCodigo()" required>
                  <option value="fundamentacion">Fundamentacion</option>
                  <option value="seminario">Seminario</option>
                  <option value="diplomado">Diplomado</option>
                </select>
              </div>
              <div class="col-md-3 campo-fund">
                <label class="form-label">NRO</label>
                <input id="nro" class="form-control" placeholder="Ej: NRO-5678">
              </div>
              <div class="col-md-3 campo-fund">
                <label class="form-label">NCI</label>
                <input id="nci" class="form-control" placeholder="Ej: NCI-5678">
              </div>
              <div class="col-md-3 campo-interno d-none">
                <label class="form-label">Nro interno</label>
                <input id="nro_interno" class="form-control" placeholder="Ej: D3433">
              </div>
              <div class="col-md-3 campo-interno d-none">
                <label class="form-label">Nro folio</label>
                <input id="nro_folio" class="form-control" placeholder="Ej: 87">
              </div>
              <div class="col-md-3">
                <label class="form-label">Valor</label>
                <input id="valor" type="number" min="0" step="1000" class="form-control" value="15000" required>
              </div>
            </div>
            <button class="btn btn-primary mt-3"><i class="bi bi-plus-circle me-1"></i>Asignar codigo</button>
          </form>
        </div>
      </div>
    ` : ''}

    ${esGerente ? `
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <h6 class="mb-0">Cartera por aliado</h6>
            <span class="badge text-bg-warning" id="saldoGlobal">Saldo pendiente: $0 COP</span>
          </div>
          <div id="tablaAliados" class="table-responsive"><div class="text-muted">Cargando saldos...</div></div>
        </div>
      </div>
    ` : `
      <div class="alert alert-info d-flex flex-wrap justify-content-between align-items-center gap-2">
        <span>Saldo pendiente por codigos usados</span>
        <strong id="saldoAliado">$0 COP</strong>
      </div>
    `}

    <div id="panelUso" class="card shadow-sm mb-4 d-none">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start gap-2 mb-3">
          <div>
            <h6 class="mb-1" id="tituloUso">Usar codigo</h6>
            <div class="text-muted small" id="codigoSeleccionado"></div>
          </div>
          <button type="button" class="btn btn-sm btn-outline-secondary" onclick="cancelarUso()">Cancelar</button>
        </div>
        <form id="formUsar">
          <input type="hidden" id="codigo_id">
          <div class="row g-3">
            <div class="col-md-3"><label class="form-label">Nombre 1</label><input id="nombre1" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Nombre 2</label><input id="nombre2" class="form-control"></div>
            <div class="col-md-3"><label class="form-label">Apellido 1</label><input id="apellido1" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Apellido 2</label><input id="apellido2" class="form-control"></div>
            <div class="col-md-3"><label class="form-label">Cedula</label><input id="alumno_cedula" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Lugar expedicion cedula</label><input id="lugar_expedicion_cedula" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Curso</label><input id="curso" class="form-control" placeholder="Diplomado, seminario..." required></div>
            <div class="col-md-3"><label class="form-label">Fecha que tomo el curso</label><input id="fecha_curso" type="date" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Fecha acta</label><input id="fecha_acta" type="date" class="form-control" required></div>
            <div class="col-md-3"><label class="form-label">Ciudad tramitado</label><input id="ciudad_tramitado" class="form-control" placeholder="Ej: Piedecuesta" required></div>
          </div>
          <button class="btn btn-success mt-3"><i class="bi bi-check2-circle me-1"></i>Guardar datos</button>
        </form>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
          <h6 class="mb-0">${esGerente ? 'Todos los codigos' : 'Mis codigos'}</h6>
          <div class="d-flex gap-2">
            <span class="badge text-bg-light border" id="resumenCodigos">0 codigos</span>
            <button class="btn btn-sm btn-outline-primary" onclick="cargarCodigos()"><i class="bi bi-arrow-clockwise"></i></button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Tipo</th>
                <th>Codigo</th>
                ${esGerente ? '<th>Aliado</th>' : ''}
                <th>Valor</th>
                <th>Abonado</th>
                <th>Saldo</th>
                <th>Estado</th>
                <th>Pago</th>
                <th>Alumno</th>
                <th>Cedula</th>
                <th>Curso</th>
                <th>Fecha acta</th>
                <th style="width:180px">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaCodigos">
              <tr><td colspan="${esGerente ? 13 : 12}" class="text-center text-muted">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  if(esGerente) document.getElementById('formAsignar').addEventListener('submit', asignarCodigo);
  document.getElementById('formUsar').addEventListener('submit', guardarUso);
}

async function cargarInicial(){ if(rol === 'gerente') await cargarAliados(); await cargarCodigos(); }

function toggleTipoCodigo(){
  const tipo = document.getElementById('tipo_codigo').value;
  document.querySelectorAll('.campo-fund').forEach(el => el.classList.toggle('d-none', tipo !== 'fundamentacion'));
  document.querySelectorAll('.campo-interno').forEach(el => el.classList.toggle('d-none', tipo === 'fundamentacion'));
}

async function cargarAliados(){
  const res = await fetch('/api/codigos/aliados', { headers: { Authorization: 'Bearer ' + token } });
  const data = await res.json();
  const sel = document.getElementById('aliado_id');
  if(!res.ok){ sel.innerHTML = '<option value="">Error</option>'; alert(data.mensaje || 'Error cargando aliados'); return; }
  aliados = data || [];
  sel.innerHTML = '<option value="">Seleccione aliado...</option>' + aliados.map(a => `<option value="${a.id}">${escapeHtml(a.usuario)}</option>`).join('');
  pintarAliados();
}

async function cargarCodigos(){
  const res = await fetch('/api/codigos', { headers: { Authorization: 'Bearer ' + token } });
  const data = await res.json();
  if(!res.ok){ alert(data.mensaje || 'Error cargando codigos'); return; }
  codigos = data || [];
  pintarCodigos();
}

async function asignarCodigo(e){
  e.preventDefault();
  const body = {
    aliado_id: document.getElementById('aliado_id').value,
    tipo_codigo: document.getElementById('tipo_codigo').value,
    nro: document.getElementById('nro').value.trim(),
    nci: document.getElementById('nci').value.trim(),
    nro_interno: document.getElementById('nro_interno').value.trim(),
    nro_folio: document.getElementById('nro_folio').value.trim(),
    valor: document.getElementById('valor').value
  };
  const res = await fetch('/api/codigos', { method:'POST', headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token }, body: JSON.stringify(body) });
  const data = await res.json();
  alert(data.mensaje || 'Operacion completada');
  if(res.ok){ e.target.reset(); document.getElementById('valor').value='15000'; toggleTipoCodigo(); cargarAliados(); cargarCodigos(); }
}

function iniciarUso(id, modo='usar'){
  const c = codigos.find(x => String(x.id) === String(id));
  if(!c) return;
  if(modo === 'usar' && c.estado !== 'disponible') return;
  modoUso = modo;
  document.getElementById('codigo_id').value = c.id;
  document.getElementById('tituloUso').textContent = modo === 'editar' ? 'Editar datos del alumno' : 'Usar codigo';
  document.getElementById('codigoSeleccionado').textContent = etiquetaCodigo(c);
  document.getElementById('formUsar').reset();
  ['nombre1','nombre2','apellido1','apellido2','alumno_cedula','lugar_expedicion_cedula','curso','fecha_curso','fecha_acta','ciudad_tramitado'].forEach(k => {
    const el = document.getElementById(k);
    if(el) el.value = c[k] || '';
  });
  if(!document.getElementById('fecha_curso').value) document.getElementById('fecha_curso').value = new Date().toISOString().slice(0,10);
  if(!document.getElementById('fecha_acta').value) document.getElementById('fecha_acta').value = new Date().toISOString().slice(0,10);
  document.getElementById('panelUso').classList.remove('d-none');
  document.getElementById('panelUso').scrollIntoView({ behavior:'smooth', block:'start' });
}

function cancelarUso(){ document.getElementById('panelUso').classList.add('d-none'); document.getElementById('formUsar').reset(); document.getElementById('codigo_id').value=''; }

function datosAlumnoBody(){
  return {
    nombre1: document.getElementById('nombre1').value.trim(),
    nombre2: document.getElementById('nombre2').value.trim(),
    apellido1: document.getElementById('apellido1').value.trim(),
    apellido2: document.getElementById('apellido2').value.trim(),
    alumno_cedula: document.getElementById('alumno_cedula').value.trim(),
    lugar_expedicion_cedula: document.getElementById('lugar_expedicion_cedula').value.trim(),
    curso: document.getElementById('curso').value.trim(),
    fecha_curso: document.getElementById('fecha_curso').value,
    fecha_acta: document.getElementById('fecha_acta').value,
    ciudad_tramitado: document.getElementById('ciudad_tramitado').value.trim()
  };
}

async function guardarUso(e){
  e.preventDefault();
  const id = document.getElementById('codigo_id').value;
  if(!id) return;
  const methodUrl = modoUso === 'editar' ? '/api/codigos/' + id : '/api/codigos/' + id + '/usar';
  const res = await fetch(methodUrl, { method:'PUT', headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token }, body: JSON.stringify(datosAlumnoBody()) });
  const data = await res.json();
  alert(data.mensaje || 'Operacion completada');
  if(res.ok){ cancelarUso(); cargarAliados(); cargarCodigos(); }
}

async function editarCodigo(id){
  const c = codigos.find(x => String(x.id) === String(id));
  if(!c) return;
  if(rol === 'aliado'){ iniciarUso(id, 'editar'); return; }

  const tipo = prompt('Tipo (fundamentacion, seminario, diplomado):', c.tipo_codigo || 'fundamentacion');
  if(tipo === null) return;
  const tipoNorm = ['seminario','diplomado'].includes(tipo.trim().toLowerCase()) ? tipo.trim().toLowerCase() : 'fundamentacion';
  const nro = prompt('NRO (solo fundamentacion):', c.tipo_codigo === 'fundamentacion' ? (c.nro || '') : '');
  if(nro === null) return;
  const nci = prompt('NCI (solo fundamentacion):', c.tipo_codigo === 'fundamentacion' ? (c.nci || '') : '');
  if(nci === null) return;
  const interno = prompt('Nro interno (seminario/diplomado):', c.nro_interno || '');
  if(interno === null) return;
  const folio = prompt('Nro folio (seminario/diplomado):', c.nro_folio || '');
  if(folio === null) return;
  const valor = prompt('Valor del codigo:', c.valor || 0);
  if(valor === null) return;
  const aliadoId = prompt('ID del aliado:', c.aliado_id || '');
  if(aliadoId === null) return;

  const body = { tipo_codigo: tipoNorm, nro:nro.trim(), nci:nci.trim(), nro_interno:interno.trim(), nro_folio:folio.trim(), valor, aliado_id: aliadoId };
  if(c.estado === 'usado') Object.assign(body, {
    nombre1:c.nombre1 || '', nombre2:c.nombre2 || '', apellido1:c.apellido1 || '', apellido2:c.apellido2 || '',
    alumno_cedula:c.alumno_cedula || '', lugar_expedicion_cedula:c.lugar_expedicion_cedula || '',
    curso:c.curso || '', fecha_curso:c.fecha_curso || '', fecha_acta:c.fecha_acta || c.fecha_expedicion || '', ciudad_tramitado:c.ciudad_tramitado || ''
  });
  const res = await fetch('/api/codigos/' + id, { method:'PUT', headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token }, body: JSON.stringify(body) });
  const data = await res.json();
  alert(data.mensaje || 'Operacion completada');
  if(res.ok){ cargarAliados(); cargarCodigos(); }
}

async function eliminarCodigo(id){
  const c = codigos.find(x => String(x.id) === String(id));
  const msg = c && c.estado === 'usado' ? 'Este codigo ya fue usado. Si lo eliminas tambien se elimina el certificado generado y sus abonos. Continuar?' : 'Eliminar este codigo disponible?';
  if(!confirm(msg)) return;
  const res = await fetch('/api/codigos/' + id, { method:'DELETE', headers:{ Authorization:'Bearer '+token } });
  const data = await res.json();
  alert(data.mensaje || 'Operacion completada');
  if(res.ok){ cargarAliados(); cargarCodigos(); }
}

async function pagarCodigo(id){
  if(!confirm('Marcar este codigo como pagado?')) return;
  const res = await fetch('/api/codigos/' + id + '/pagar', { method:'PUT', headers:{ Authorization:'Bearer '+token } });
  const data = await res.json();
  alert(data.mensaje || 'Operacion completada');
  if(res.ok){ cargarAliados(); cargarCodigos(); }
}

async function abonarCodigo(id){
  const c = codigos.find(x => String(x.id) === String(id));
  if(!c) return;
  const valor = prompt('Valor del abono. Saldo actual: ' + formatCOP(c.saldo_codigo || 0), c.saldo_codigo || 0);
  if(valor === null) return;
  const nota = prompt('Nota del abono:', '');
  if(nota === null) return;
  const res = await fetch('/api/codigos/' + id + '/pagar', { method:'PUT', headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token }, body: JSON.stringify({ valor, nota }) });
  const data = await res.json();
  alert(data.mensaje || 'Operacion completada');
  if(res.ok){ cargarAliados(); cargarCodigos(); }
}

async function pagarAliado(id){
  const aliado = aliados.find(a => String(a.id) === String(id));
  if(!confirm('Poner en cero el saldo pendiente de ' + (aliado ? aliado.usuario : 'este aliado') + '?')) return;
  const res = await fetch('/api/codigos/aliados/' + id + '/pagar', { method:'PUT', headers:{ Authorization:'Bearer '+token } });
  const data = await res.json();
  alert(data.mensaje || 'Operacion completada');
  if(res.ok){ cargarAliados(); cargarCodigos(); }
}

function pintarAliados(){
  if(rol !== 'gerente') return;
  const cont = document.getElementById('tablaAliados');
  if(!cont) return;
  const saldoTotal = aliados.reduce((sum, a) => sum + (Number(a.saldo_pendiente) || 0), 0);
  document.getElementById('saldoGlobal').textContent = 'Saldo pendiente: ' + formatCOP(saldoTotal);
  if(!aliados.length){ cont.innerHTML = '<div class="text-muted">No hay usuarios aliados creados.</div>'; return; }
  cont.innerHTML = `<table class="table table-sm table-hover align-middle mb-0"><thead class="table-light"><tr><th>ID</th><th>Aliado</th><th>Codigos</th><th>Disponibles</th><th>Usados sin pagar</th><th>Saldo</th><th>Accion</th></tr></thead><tbody>${aliados.map(a => {
    const saldo = Number(a.saldo_pendiente) || 0;
    return `<tr><td>${a.id}</td><td>${escapeHtml(a.usuario)}</td><td>${Number(a.total_codigos)||0}</td><td>${Number(a.disponibles)||0}</td><td>${Number(a.codigos_pendientes_pago)||0}</td><td><strong class="${saldo > 0 ? 'text-danger' : 'text-success'}">${formatCOP(saldo)}</strong></td><td>${saldo > 0 ? `<button class="btn btn-sm btn-outline-success" onclick="pagarAliado(${a.id})">Pago / poner en cero</button>` : '<span class="text-muted small">Sin deuda</span>'}</td></tr>`;
  }).join('')}</tbody></table>`;
}

function etiquetaCodigo(c){
  const tipo = c.tipo_codigo || 'fundamentacion';
  if(tipo === 'fundamentacion') return `Fundamentacion · NRO ${c.nro || '-'} / NCI ${c.nci || '-'}`;
  return `${tipo.charAt(0).toUpperCase() + tipo.slice(1)} · Interno ${c.nro_interno || '-'} / Folio ${c.nro_folio || '-'}`;
}

function pintarCodigos(){
  const esGerente = rol === 'gerente';
  const tbody = document.getElementById('tablaCodigos');
  const total = codigos.length;
  const disponibles = codigos.filter(c => c.estado === 'disponible').length;
  const saldoPendiente = codigos.filter(c => c.estado === 'usado' && c.estado_pago === 'pendiente').reduce((sum, c) => sum + (Number(c.saldo_codigo) || 0), 0);
  document.getElementById('resumenCodigos').textContent = `${total} codigos · ${disponibles} disponibles`;
  const saldoAliado = document.getElementById('saldoAliado');
  if(saldoAliado) saldoAliado.textContent = formatCOP(saldoPendiente);
  if(!codigos.length){ tbody.innerHTML = `<tr><td colspan="${esGerente ? 13 : 12}" class="text-center text-muted">No hay codigos asignados</td></tr>`; return; }

  tbody.innerHTML = codigos.map(c => {
    const disponible = c.estado === 'disponible';
    const badge = disponible ? '<span class="badge text-bg-success">Disponible</span>' : '<span class="badge text-bg-secondary">Usado</span>';
    const pago = c.estado === 'usado' ? (c.estado_pago === 'pagado' ? '<span class="badge text-bg-success">Pagado</span>' : '<span class="badge text-bg-warning">Pendiente</span>') : '<span class="text-muted small">No aplica</span>';
    const acciones = disponible
      ? `<button class="btn btn-sm btn-success" onclick="iniciarUso(${c.id})">Usar</button>${esGerente ? `<button class="btn btn-sm btn-outline-secondary" onclick="editarCodigo(${c.id})">Editar</button><button class="btn btn-sm btn-outline-danger" onclick="eliminarCodigo(${c.id})">Eliminar</button>` : ''}`
      : `${c.certificado_id ? `<span class="text-muted small">Cert. #${c.certificado_id}</span>` : ''}${esGerente ? `<button class="btn btn-sm btn-outline-secondary" onclick="editarCodigo(${c.id})">Editar</button><button class="btn btn-sm btn-outline-danger" onclick="eliminarCodigo(${c.id})">Eliminar</button>` : `<button class="btn btn-sm btn-outline-secondary" onclick="editarCodigo(${c.id})">Editar datos</button>`}${esGerente && c.estado_pago === 'pendiente' ? `<button class="btn btn-sm btn-outline-primary" onclick="abonarCodigo(${c.id})">Abonar</button><button class="btn btn-sm btn-outline-success" onclick="pagarCodigo(${c.id})">Pago</button>` : ''}`;
    return `<tr>
      <td>${escapeHtml(c.tipo_codigo || 'fundamentacion')}</td>
      <td><strong>${escapeHtml(etiquetaCodigo(c))}</strong></td>
      ${esGerente ? `<td>${escapeHtml(c.aliado || '-')}</td>` : ''}
      <td>${formatCOP(c.valor || 0)}</td>
      <td>${formatCOP(c.total_abonado || 0)}</td>
      <td>${formatCOP(c.saldo_codigo || 0)}</td>
      <td>${badge}</td>
      <td>${pago}</td>
      <td>${escapeHtml(c.alumno_nombre || '-')}</td>
      <td>${escapeHtml(c.alumno_cedula || '-')}</td>
      <td>${escapeHtml(c.curso || '-')}</td>
      <td>${escapeHtml(c.fecha_acta || c.fecha_expedicion || '-')}</td>
      <td><div class="d-flex flex-wrap gap-1">${acciones}</div></td>
    </tr>`;
  }).join('');
}

function escapeHtml(s){ if(s === null || s === undefined) return ''; return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function formatCOP(n){ return '$' + Number(n || 0).toLocaleString('es-CO') + ' COP'; }
</script>
</body>
</html>
