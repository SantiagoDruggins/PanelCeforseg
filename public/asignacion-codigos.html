<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asignacion de codigos - CEFORSEG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body>
<script>
if(!localStorage.getItem('token')) location.href='/login';
if(!['gerente','aliado'].includes(localStorage.getItem('rol') || '')) location.href='/dashboard';
</script>

<div id="app"></div>

<script>
const token = localStorage.getItem('token');
const rol = localStorage.getItem('rol') || '';
let codigos = [];

fetch('/layout.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('app').innerHTML = html;
    render();
    cargarInicial();
  });

function render(){
  const content = document.querySelector('.content');
  const esGerente = rol === 'gerente';

  content.innerHTML = `
    <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-4">
      <div>
        <h3 class="fw-bold mb-1"><i class="bi bi-upc-scan me-2"></i>Asignacion de codigos</h3>
        <p class="text-muted mb-0">Codigos NRO y NCI vendidos o asignados para legalizar cursos y diplomas.</p>
      </div>
      <span class="badge text-bg-primary mt-1">${esGerente ? 'Gerente' : 'Aliado'}</span>
    </div>

    ${esGerente ? `
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h6 class="mb-3">Asignar codigo a socio / aliado / comprador</h6>
          <form id="formAsignar">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Aliado</label>
                <select id="aliado_id" class="form-select" required>
                  <option value="">Cargando aliados...</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">NRO</label>
                <input id="nro" class="form-control" placeholder="Ej: NRO-0001" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">NCI</label>
                <input id="nci" class="form-control" placeholder="Ej: NCI-0001" required>
              </div>
            </div>
            <button class="btn btn-primary mt-3"><i class="bi bi-plus-circle me-1"></i>Asignar codigo</button>
          </form>
        </div>
      </div>
    ` : ''}

    <div id="panelUso" class="card shadow-sm mb-4 d-none">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start gap-2 mb-3">
          <div>
            <h6 class="mb-1">Usar codigo</h6>
            <div class="text-muted small" id="codigoSeleccionado"></div>
          </div>
          <button type="button" class="btn btn-sm btn-outline-secondary" onclick="cancelarUso()">Cancelar</button>
        </div>
        <form id="formUsar">
          <input type="hidden" id="codigo_id">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Nombre y apellido</label>
              <input id="alumno_nombre" class="form-control" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Cedula</label>
              <input id="alumno_cedula" class="form-control" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Nombre del curso</label>
              <input id="curso" class="form-control" required>
            </div>
            <div class="col-md-2">
              <label class="form-label">Fecha expedicion</label>
              <input id="fecha_expedicion" type="date" class="form-control" required>
            </div>
          </div>
          <button class="btn btn-success mt-3"><i class="bi bi-check2-circle me-1"></i>Registrar uso</button>
        </form>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
          <h6 class="mb-0">${esGerente ? 'Todos los codigos' : 'Mis codigos'}</h6>
          <div class="d-flex gap-2">
            <span class="badge text-bg-light border" id="resumenCodigos">0 codigos</span>
            <button class="btn btn-sm btn-outline-primary" onclick="cargarCodigos()"><i class="bi bi-arrow-clockwise"></i></button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>NRO</th>
                <th>NCI</th>
                ${esGerente ? '<th>Aliado</th>' : ''}
                <th>Estado</th>
                <th>Alumno</th>
                <th>Cedula</th>
                <th>Curso</th>
                <th>Fecha expedicion</th>
                <th style="width:150px">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaCodigos">
              <tr><td colspan="${esGerente ? 9 : 8}" class="text-center text-muted">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  if(esGerente){
    document.getElementById('formAsignar').addEventListener('submit', asignarCodigo);
  }
  document.getElementById('formUsar').addEventListener('submit', usarCodigo);
}

async function cargarInicial(){
  if(rol === 'gerente') await cargarAliados();
  await cargarCodigos();
}

async function cargarAliados(){
  const res = await fetch('/api/codigos/aliados', { headers: { Authorization: 'Bearer ' + token } });
  const data = await res.json();
  const sel = document.getElementById('aliado_id');
  if(!res.ok){
    sel.innerHTML = '<option value="">Error cargando aliados</option>';
    alert(data.mensaje || 'Error cargando aliados');
    return;
  }
  sel.innerHTML = '<option value="">Seleccione aliado...</option>' + (data || []).map(a =>
    `<option value="${a.id}">${escapeHtml(a.usuario)}</option>`
  ).join('');
}

async function cargarCodigos(){
  const res = await fetch('/api/codigos', { headers: { Authorization: 'Bearer ' + token } });
  const data = await res.json();
  if(!res.ok){
    alert(data.mensaje || 'Error cargando codigos');
    return;
  }
  codigos = data || [];
  pintarCodigos();
}

async function asignarCodigo(e){
  e.preventDefault();
  const body = {
    aliado_id: document.getElementById('aliado_id').value,
    nro: document.getElementById('nro').value.trim(),
    nci: document.getElementById('nci').value.trim()
  };
  const res = await fetch('/api/codigos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  alert(data.mensaje || 'Operacion completada');
  if(res.ok){
    e.target.reset();
    cargarCodigos();
  }
}

function iniciarUso(id){
  const c = codigos.find(x => String(x.id) === String(id));
  if(!c || c.estado !== 'disponible') return;
  document.getElementById('codigo_id').value = c.id;
  document.getElementById('codigoSeleccionado').textContent = `NRO ${c.nro} / NCI ${c.nci}`;
  document.getElementById('formUsar').reset();
  document.getElementById('codigo_id').value = c.id;
  const fecha = document.getElementById('fecha_expedicion');
  fecha.value = new Date().toISOString().slice(0, 10);
  document.getElementById('panelUso').classList.remove('d-none');
  document.getElementById('panelUso').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function cancelarUso(){
  document.getElementById('panelUso').classList.add('d-none');
  document.getElementById('formUsar').reset();
  document.getElementById('codigo_id').value = '';
}

async function usarCodigo(e){
  e.preventDefault();
  const id = document.getElementById('codigo_id').value;
  if(!id) return;

  const body = {
    alumno_nombre: document.getElementById('alumno_nombre').value.trim(),
    alumno_cedula: document.getElementById('alumno_cedula').value.trim(),
    curso: document.getElementById('curso').value.trim(),
    fecha_expedicion: document.getElementById('fecha_expedicion').value
  };

  const res = await fetch('/api/codigos/' + id + '/usar', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  alert(data.mensaje || 'Operacion completada');
  if(res.ok){
    cancelarUso();
    cargarCodigos();
  }
}

async function eliminarCodigo(id){
  if(!confirm('Eliminar este codigo disponible?')) return;
  const res = await fetch('/api/codigos/' + id, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + token }
  });
  const data = await res.json();
  alert(data.mensaje || 'Operacion completada');
  if(res.ok) cargarCodigos();
}

function pintarCodigos(){
  const esGerente = rol === 'gerente';
  const tbody = document.getElementById('tablaCodigos');
  const total = codigos.length;
  const disponibles = codigos.filter(c => c.estado === 'disponible').length;
  document.getElementById('resumenCodigos').textContent = `${total} codigos · ${disponibles} disponibles`;

  if(!codigos.length){
    tbody.innerHTML = `<tr><td colspan="${esGerente ? 9 : 8}" class="text-center text-muted">No hay codigos asignados</td></tr>`;
    return;
  }

  tbody.innerHTML = codigos.map(c => {
    const disponible = c.estado === 'disponible';
    const badge = disponible
      ? '<span class="badge text-bg-success">Disponible</span>'
      : '<span class="badge text-bg-secondary">Usado</span>';
    const acciones = disponible
      ? `<button class="btn btn-sm btn-success" onclick="iniciarUso(${c.id})">Usar</button>
         ${esGerente ? `<button class="btn btn-sm btn-outline-danger" onclick="eliminarCodigo(${c.id})">Eliminar</button>` : ''}`
      : (c.certificado_id ? `<span class="text-muted small">Cert. #${c.certificado_id}</span>` : '<span class="text-muted small">Sin acciones</span>');

    return `
      <tr>
        <td><strong>${escapeHtml(c.nro)}</strong></td>
        <td><strong>${escapeHtml(c.nci)}</strong></td>
        ${esGerente ? `<td>${escapeHtml(c.aliado || '-')}</td>` : ''}
        <td>${badge}</td>
        <td>${escapeHtml(c.alumno_nombre || '-')}</td>
        <td>${escapeHtml(c.alumno_cedula || '-')}</td>
        <td>${escapeHtml(c.curso || '-')}</td>
        <td>${escapeHtml(c.fecha_expedicion || '-')}</td>
        <td><div class="d-flex flex-wrap gap-1">${acciones}</div></td>
      </tr>
    `;
  }).join('');
}

function escapeHtml(s){
  if(s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[m]));
}
</script>
</body>
</html>
