<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard - CEFORSEG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  .card-acceso { transition: transform .15s; }
  .card-acceso:hover { transform: translateY(-2px); }
  .card-acceso a { text-decoration: none; color: inherit; display: block; padding: 1rem; }
  .card-acceso .h5 { margin: 0; }
  .card-acceso small { opacity: .85; }
  .card-acceso .icono{
    font-size:28px;
    width:44px;
    height:44px;
    border-radius:14px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:rgba(10,59,120,.06);
    color:#0a3b78;
    margin-bottom:6px;
  }
  .metric-card { min-height: 112px; }
  .period-btn.active { background:#0a3b78; color:#fff; border-color:#0a3b78; }
  .spark-bars { height: 150px; display:flex; align-items:end; gap:8px; padding-top:12px; }
  .spark-bar { flex:1; min-width:16px; background:#0a3b78; border-radius:6px 6px 0 0; position:relative; }
  .spark-bar small { position:absolute; left:50%; bottom:-22px; transform:translateX(-50%); font-size:11px; color:#6c757d; white-space:nowrap; }
  .ai-panel {
    border:1px solid #d9e2ef;
    border-radius:8px;
    background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    box-shadow:0 14px 34px rgba(10, 59, 120, .08);
    overflow:hidden;
  }
  .ai-panel-head {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 16px;
    border-bottom:1px solid #e7edf5;
    background:#fff;
  }
  .ai-title {
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
  }
  .ai-title i {
    width:34px;
    height:34px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:8px;
    background:#0a3b78;
    color:#fff;
  }
  .ai-chip {
    display:inline-flex;
    align-items:center;
    gap:6px;
    width:max-content;
    max-width:100%;
    padding:4px 9px;
    border-radius:999px;
    background:#eef6ff;
    color:#0a3b78;
    font-size:12px;
    font-weight:600;
  }
  .ai-body { padding:16px; }
  .ai-output {
    max-height:360px;
    overflow:auto;
    padding-right:6px;
    color:#172033;
    font-size:14px;
    line-height:1.55;
  }
  .ai-output h5 {
    margin:16px 0 8px;
    font-size:15px;
    font-weight:800;
    color:#0a3b78;
  }
  .ai-output p { margin:0 0 10px; }
  .ai-output strong { color:#07192f; }
  .ai-output ul { margin:0 0 12px; padding-left:18px; }
  .ai-output li { margin-bottom:6px; }
  .ai-placeholder {
    border:1px dashed #c9d7e8;
    border-radius:8px;
    padding:14px;
    color:#6b7788;
    background:#fbfdff;
  }
  @media(max-width:768px){
    .ai-panel-head { align-items:flex-start; flex-direction:column; }
    .ai-panel-head .btn { width:100%; }
  }
</style>
</head>

<body>
<script>
if(!localStorage.getItem('token')) location.href='/login';
</script>

<div id="app"></div>

<script src="/permisos.js"></script>
<script>
function formatCOP(n){ if(n==null||n==='') return '$0 COP'; return '$' + Number(n).toLocaleString('es-CO') + ' COP'; }
let periodoFinanzas = 'dia';
let ultimaFinanza = null;

fetch('/layout.html')
.then(r=>r.text())
.then(html=>{
  document.getElementById('app').innerHTML = html;
  aplicarPermisosPanel();
  const content = document.querySelector('.content');
  const rol = localStorage.getItem('rol') || '';

  if (rol === 'aliado') {
    content.innerHTML = `
      <h3 class="fw-bold mb-3"><i class="bi bi-upc-scan me-2"></i>Codigos asignados</h3>
      <p class="text-muted mb-4">Usa tus codigos disponibles registrando los datos del alumno.</p>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso border-primary">
            <a href="/asignacion-codigos">
              <div class="icono"><i class="bi bi-upc-scan"></i></div>
              <h5 class="mt-2">Asignacion de codigos</h5>
              <small class="text-muted">Ver disponibles y registrar alumnos</small>
            </a>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso">
            <a href="/validar">
              <div class="icono"><i class="bi bi-check2-circle"></i></div>
              <h5 class="mt-2">Validar certificado</h5>
              <small class="text-muted">Consultar por cedula</small>
            </a>
          </div>
        </div>
      </div>
    `;
  } else if (rol === 'secretaria') {
    content.innerHTML = `
      <h3 class="fw-bold mb-3"><i class="bi bi-clipboard-check me-2"></i>Operativo</h3>
      <p class="text-muted mb-4">Accesos directos a lo que más usas.</p>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso border-primary">
            <a href="/matricular">
              <div class="icono"><i class="bi bi-plus-circle-fill"></i></div>
              <h5 class="mt-2">Matricular</h5>
              <small class="text-muted">Registrar nuevo estudiante y cursos</small>
            </a>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso border-primary">
            <a href="/estudiantes-panel">
              <div class="icono"><i class="bi bi-people-fill"></i></div>
              <h5 class="mt-2">Estudiantes</h5>
              <small class="text-muted">Buscar y ver fichas</small>
            </a>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso border-success">
            <a href="/cierre-caja">
              <div class="icono"><i class="bi bi-cash-coin"></i></div>
              <h5 class="mt-2">Cierre de caja</h5>
              <small class="text-muted">Conteo y cierre del día</small>
            </a>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso">
            <a href="/certificados-panel">
              <div class="icono"><i class="bi bi-file-earmark-text"></i></div>
              <h5 class="mt-2">Certificados</h5>
              <small class="text-muted">Subir y gestionar diplomas</small>
            </a>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso">
            <a href="/validar">
              <div class="icono"><i class="bi bi-check2-circle"></i></div>
              <h5 class="mt-2">Validar certificado</h5>
              <small class="text-muted">Consultar por cédula</small>
            </a>
          </div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-md-4">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Recaudo hoy</small>
              <h4 class="text-success mb-0" id="recaudoHoy">$0 COP</h4>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Alumnos con deuda</small>
              <h4 class="mb-0" id="alumnosDeudores">0</h4>
            </div>
          </div>
        </div>
      </div>
    `;
  } else {
    content.innerHTML = `
      <h3 class="fw-bold mb-3"><i class="bi bi-shield-check me-2"></i>Auditoría y caja</h3>
      <p class="text-muted mb-4">Vista gerente: caja, movimientos y totales.</p>

      <div id="alertaCierre" class="alert alert-warning d-none mb-3">Aún no hay cierre de caja hoy. Revisa con la secretaria.</div>
      <div id="alertaCierreOk" class="alert alert-success d-none mb-3">Cierre de caja del día registrado.</div>

      <div class="row g-3 mb-4">
        <div class="col-md-3">
          <div class="card shadow rounded-3 border-success">
            <div class="card-body">
              <small>Recaudo hoy (total)</small>
              <h4 class="text-success mb-0" id="recaudoTotalHoy">$0 COP</h4>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Efectivo hoy</small>
              <h5 class="mb-0" id="efectivoHoy">$0 COP</h5>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Nequi hoy</small>
              <h5 class="mb-0" id="nequiHoy">$0 COP</h5>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Transferencias hoy</small>
              <h5 class="mb-0" id="transferenciaHoy">$0 COP</h5>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Total estudiantes</small>
              <h4 class="mb-0" id="totalEstudiantes">0</h4>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Deuda total</small>
              <h4 class="text-danger mb-0" id="deudaTotal">$0 COP</h4>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Alumnos con deuda</small>
              <h4 class="mb-0" id="alumnosDeudores">0</h4>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Último cierre</small>
              <h6 class="mb-0" id="ultimoCierreTexto">—</h6>
              <a href="/cierres-caja-panel" class="small">Ver historial</a>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow rounded-3 mb-4">
        <div class="card-header bg-white">
          <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
            <div>
              <strong>Analitica financiera</strong>
              <div class="small text-muted" id="rangoFinanzas">Calculando periodo...</div>
            </div>
            <div class="btn-group btn-group-sm" role="group" aria-label="Periodo financiero">
              <button class="btn btn-outline-primary period-btn active" data-periodo="dia" onclick="cambiarPeriodoFinanzas('dia', this)">Dia</button>
              <button class="btn btn-outline-primary period-btn" data-periodo="semana" onclick="cambiarPeriodoFinanzas('semana', this)">Semana</button>
              <button class="btn btn-outline-primary period-btn" data-periodo="quincena" onclick="cambiarPeriodoFinanzas('quincena', this)">Quincena</button>
              <button class="btn btn-outline-primary period-btn" data-periodo="mes" onclick="cambiarPeriodoFinanzas('mes', this)">Mes</button>
              <button class="btn btn-outline-primary period-btn" data-periodo="trimestre" onclick="cambiarPeriodoFinanzas('trimestre', this)">Trimestre</button>
              <button class="btn btn-outline-primary period-btn" data-periodo="anio" onclick="cambiarPeriodoFinanzas('anio', this)">Ano</button>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="row g-3 mb-3">
            <div class="col-md-3">
              <div class="border rounded-3 p-3 metric-card">
                <small>Ingresos periodo</small>
                <h4 class="text-success mb-1" id="finIngresos">$0 COP</h4>
                <span class="small text-muted" id="finMovimientos">0 movimientos</span>
              </div>
            </div>
            <div class="col-md-3">
              <div class="border rounded-3 p-3 metric-card">
                <small>Utilidad estimada</small>
                <h4 class="mb-1" id="finUtilidad">$0 COP</h4>
                <span class="small text-muted">Ingresos menos nomina configurada</span>
              </div>
            </div>
            <div class="col-md-3">
              <div class="border rounded-3 p-3 metric-card">
                <small>Vs periodo anterior</small>
                <h4 class="mb-1" id="finComparacion">$0 COP</h4>
                <span class="small text-muted" id="finComparacionDetalle">Sin comparacion</span>
              </div>
            </div>
            <div class="col-md-3">
              <div class="border rounded-3 p-3 metric-card">
                <small>Deuda activa</small>
                <h4 class="text-danger mb-1" id="finDeuda">$0 COP</h4>
                <span class="small text-muted" id="finDeudores">0 estudiantes</span>
              </div>
            </div>
          </div>

          <div class="row g-3">
            <div class="col-lg-7">
              <div class="border rounded-3 p-3 h-100">
                <div class="d-flex justify-content-between align-items-center">
                  <strong>Ingresos por dia</strong>
                  <span class="small text-muted" id="finCostos">Nomina: $0 COP</span>
                </div>
                <div class="spark-bars mb-4" id="finBarras"></div>
              </div>
            </div>
            <div class="col-lg-5">
              <div class="border rounded-3 p-3 h-100">
                <strong>Cursos con mas recaudo</strong>
                <div id="finTopCursos" class="mt-2 small text-muted">Sin datos</div>
              </div>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-lg-7">
              <div class="ai-panel">
                <div class="ai-panel-head">
                  <div>
                    <div class="ai-title"><i class="bi bi-stars"></i><span>Auditoria IA</span></div>
                    <div id="aiMensaje" class="ai-chip mt-2"><i class="bi bi-cpu"></i><span>Gemini listo si la API key esta configurada</span></div>
                  </div>
                  <button class="btn btn-sm btn-primary" id="btnAuditoriaIA" onclick="generarAuditoriaIA()">
                    <i class="bi bi-magic me-1"></i> Analizar
                  </button>
                </div>
                <div class="ai-body">
                  <div id="aiOutput" class="ai-output">
                    <div class="ai-placeholder">Selecciona un periodo y ejecuta el analisis.</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-5">
              <div class="border rounded-3 p-3">
                <strong>Estudiantes con deuda</strong>
                <div id="finMorosos" class="mt-2 small text-muted">Sin datos</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow rounded-3 mb-4">
        <div class="card-header bg-dark text-white">Últimos abonos (movimientos)</div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover table-sm mb-0">
              <thead class="table-light">
                <tr>
                  <th>Fecha</th>
                  <th>Estudiante</th>
                  <th>Valor</th>
                  <th>Método</th>
                  <th>Factura</th>
                  <th>Registrado por</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="tablaUltimosAbonos">
                <tr><td colspan="7" class="text-center text-muted">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }

  fetch('/api/dashboard', { headers: { Authorization: 'Bearer ' + localStorage.getItem('token') } })
  .then(r=>r.json())
  .then(d=>{
    const fmt = typeof formatCOP === 'function' ? formatCOP : (n)=>'$'+Number(n).toLocaleString('es-CO')+' COP';
    if (document.getElementById('totalEstudiantes')) document.getElementById('totalEstudiantes').innerText = d.estudiantes;
    if (document.getElementById('recaudoHoy')) document.getElementById('recaudoHoy').innerText = fmt(d.recaudo_hoy);
    if (document.getElementById('deudaTotal')) document.getElementById('deudaTotal').innerText = fmt(d.deuda_total);
    if (document.getElementById('alumnosDeudores')) document.getElementById('alumnosDeudores').innerText = d.alumnos_deudores;
  });

  if (rol === 'gerente') {
    fetch('/api/dashboard/auditoria', { headers: { Authorization: 'Bearer ' + localStorage.getItem('token') } })
    .then(r=>r.json())
    .then(d=>{
      const fmt = typeof formatCOP === 'function' ? formatCOP : (n)=>'$'+Number(n).toLocaleString('es-CO')+' COP';
      if (document.getElementById('recaudoTotalHoy')) document.getElementById('recaudoTotalHoy').innerText = fmt(d.recaudo_hoy.total);
      if (document.getElementById('efectivoHoy')) document.getElementById('efectivoHoy').innerText = fmt(d.recaudo_hoy.efectivo);
      if (document.getElementById('nequiHoy')) document.getElementById('nequiHoy').innerText = fmt(d.recaudo_hoy.nequi);
      if (document.getElementById('transferenciaHoy')) document.getElementById('transferenciaHoy').innerText = fmt(d.recaudo_hoy.transferencia);

      if (d.cierre_hecho_hoy) {
        const el = document.getElementById('alertaCierreOk'); if (el) el.classList.remove('d-none');
      } else {
        const el = document.getElementById('alertaCierre'); if (el) el.classList.remove('d-none');
      }

      if (d.ultimo_cierre) {
        const c = d.ultimo_cierre;
        const txt = document.getElementById('ultimoCierreTexto');
        if (txt) txt.innerHTML = (c.fecha || '').slice(0,10) + ' · ' + fmt(c.total_sistema) + (c.usuario ? '<br><small>' + c.usuario + '</small>' : '');
      }

      const tbody = document.getElementById('tablaUltimosAbonos');
      if (tbody) {
        if (!d.ultimos_abonos || d.ultimos_abonos.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-muted">Sin abonos recientes</td></tr>';
        } else {
          tbody.innerHTML = d.ultimos_abonos.map(a=>`
            <tr
              data-abono-id="${a.id}"
              data-valor="${a.valor}"
              data-nota="${escapeAttr(a.nota || '')}"
              data-metodo="${escapeAttr(a.metodo_pago || 'efectivo')}"
              data-factura="${escapeAttr(a.numero_factura || '')}"
              data-fecha="${escapeAttr((a.fecha || '').toString().slice(0, 10))}"
            >
              <td>${(a.fecha||'').toString().slice(0,16).replace('T',' ')}</td>
              <td>${(a.estudiante||'—').toString().slice(0,25)}</td>
              <td>${fmt(a.valor)}</td>
              <td>${(a.metodo_pago||'efectivo')}</td>
              <td>${(a.numero_factura||'—').toString().slice(0,12)}</td>
              <td>${(a.registrado_por||'—')}</td>

                <div class="d-flex gap-1 justify-content-center">
                  <button class="btn btn-sm btn-outline-secondary" onclick="editarAbonoDashboard(this)">Editar</button>
                  <button class="btn btn-sm btn-outline-danger" onclick="eliminarAbonoDashboard(this)">Eliminar</button>
                </div>
              </td>
            </tr>
          `).join('');
        }
      }
    });

    cargarFinanzas();
  }

function escapeAttr(s){
  return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function editarAbonoDashboard(btn){
  const tr = btn.closest('tr');
  const id = tr.getAttribute('data-abono-id');
  const valor = tr.getAttribute('data-valor');
  const nota = tr.getAttribute('data-nota') || '';
  const metodo = tr.getAttribute('data-metodo') || 'efectivo';
  const factura = tr.getAttribute('data-factura') || '';
  const fechaRow = (tr.getAttribute('data-fecha') || '').trim();

  const v = prompt('Valor del abono:', valor);
  if(v === null) return;

  const n = prompt('Número de factura (obligatorio):', factura);
  if(n === null) return;
  if(!n.toString().trim()){ alert('El número de factura es obligatorio.'); return; }

  const fe = prompt('Fecha del abono (AAAA-MM-DD):', fechaRow || new Date().toISOString().slice(0, 10));
  if(fe === null) return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test((fe || '').trim())){ alert('Usa el formato AAAA-MM-DD para la fecha.'); return; }

  const no = prompt('Nota:', nota);
  if(no === null) return;

  const met = prompt('Método de pago:', metodo);
  if(met === null) return;

  fetch('/api/abonos/' + id, {
    method:'PUT',
    headers:{ 'Content-Type':'application/json', Authorization:'Bearer ' + localStorage.getItem('token') },
    body: JSON.stringify({ valor: v, nota: no, metodo_pago: met, numero_factura: n, fecha: fe.trim() })
  })
  .then(r=>r.json())
  .then(data=>{
    alert(data.mensaje || 'Actualizado');
    location.reload();
  });
}

function eliminarAbonoDashboard(btn){
  const tr = btn.closest('tr');
  const id = tr.getAttribute('data-abono-id');

  if(!confirm('¿Eliminar este abono? Se restituirá el saldo al curso.')) return;

  fetch('/api/abonos/' + id, {
    method:'DELETE',
    headers:{ Authorization:'Bearer ' + localStorage.getItem('token') }
  })
  .then(r=>r.json())
  .then(data=>{
    alert(data.mensaje || 'Eliminado');
    location.reload();
  });
}

function cambiarPeriodoFinanzas(periodo, btn){
  periodoFinanzas = periodo;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  cargarFinanzas();
}

function porcentajeTxt(v){
  if(v === null || v === undefined) return 'Sin periodo anterior';
  const signo = v > 0 ? '+' : '';
  return signo + Number(v).toFixed(1) + '%';
}

function renderLista(items, renderItem, empty){
  if(!items || items.length === 0) return `<div class="text-muted">${empty}</div>`;
  return items.map(renderItem).join('');
}

function escapeHtml(s){
  const div = document.createElement('div');
  div.textContent = String(s ?? '');
  return div.innerHTML;
}

function markdownBasico(texto){
  const safe = escapeHtml(texto || '')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^\s*[-•]\s+(.+)$/gm, '<li>$1</li>');

  return safe
    .split(/\n{2,}/)
    .map(block => {
      const clean = block.trim();
      if(!clean) return '';
      if(/^<li>/.test(clean)) return `<ul>${clean}</ul>`;
      if(/^<strong>.*<\/strong>$/.test(clean) && clean.length < 90) return `<h5>${clean.replace(/<\/?strong>/g, '')}</h5>`;
      if(/^\d+\)\s*/.test(clean)) return `<h5>${clean.replace(/^\d+\)\s*/, '')}</h5>`;
      return `<p>${clean.replace(/\n/g, '<br>')}</p>`;
    })
    .join('');
}

function setAiMensaje(texto, icono){
  const msg = document.getElementById('aiMensaje');
  if(!msg) return;
  msg.innerHTML = `<i class="bi ${icono || 'bi-cpu'}"></i><span>${escapeHtml(texto)}</span>`;
}

function setAiOutput(html){
  const out = document.getElementById('aiOutput');
  if(out) out.innerHTML = html;
}

async function cargarFinanzas(){
  const headers = { Authorization: 'Bearer ' + localStorage.getItem('token') };
  const res = await fetch('/api/dashboard/finanzas?periodo=' + encodeURIComponent(periodoFinanzas), { headers });
  const data = await res.json();
  if(!res.ok){
    const out = document.getElementById('aiOutput');
    if(out) out.textContent = data.mensaje || 'No se pudo cargar la analitica.';
    return;
  }

  ultimaFinanza = data;
  const fmt = typeof formatCOP === 'function' ? formatCOP : (n)=>'$'+Number(n).toLocaleString('es-CO')+' COP';

  const rango = document.getElementById('rangoFinanzas');
  if(rango) rango.textContent = `${data.rango.desde} a ${data.rango.hasta} · comparado con ${data.rango.prev_desde} a ${data.rango.prev_hasta}`;

  const ingresos = document.getElementById('finIngresos');
  if(ingresos) ingresos.textContent = fmt(data.ingresos.total);

  const mov = document.getElementById('finMovimientos');
  if(mov) mov.textContent = `${data.ingresos.movimientos} movimientos`;

  const utilidad = document.getElementById('finUtilidad');
  if(utilidad){
    utilidad.textContent = fmt(data.utilidad_estimada);
    utilidad.className = 'mb-1 ' + (Number(data.utilidad_estimada) >= 0 ? 'text-success' : 'text-danger');
  }

  const comp = document.getElementById('finComparacion');
  if(comp){
    const dif = Number(data.comparacion.diferencia || 0);
    comp.textContent = (dif >= 0 ? '+' : '') + fmt(dif);
    comp.className = 'mb-1 ' + (dif >= 0 ? 'text-success' : 'text-danger');
  }

  const compDetalle = document.getElementById('finComparacionDetalle');
  if(compDetalle) compDetalle.textContent = `${porcentajeTxt(data.comparacion.porcentaje)} vs ${fmt(data.comparacion.periodo_anterior_total)}`;

  const deuda = document.getElementById('finDeuda');
  if(deuda) deuda.textContent = fmt(data.deuda.total);

  const deudores = document.getElementById('finDeudores');
  if(deudores) deudores.textContent = `${data.deuda.estudiantes} estudiantes`;

  const costos = document.getElementById('finCostos');
  if(costos) costos.textContent = `Nomina: ${fmt(data.costos_nomina.total)}`;

  const barras = document.getElementById('finBarras');
  if(barras){
    const max = Math.max(1, ...((data.por_dia || []).map(x=>Number(x.total) || 0)));
    barras.innerHTML = (data.por_dia && data.por_dia.length)
      ? data.por_dia.map(x=>{
          const h = Math.max(8, Math.round((Number(x.total || 0) / max) * 130));
          const label = (x.dia || '').slice(5);
          return `<div class="spark-bar" title="${x.dia}: ${fmt(x.total)}" style="height:${h}px"><small>${label}</small></div>`;
        }).join('')
      : '<div class="text-muted small">Sin ingresos en este periodo.</div>';
  }

  const top = document.getElementById('finTopCursos');
  if(top){
    top.innerHTML = renderLista(data.top_cursos, c => `
      <div class="d-flex justify-content-between border-bottom py-2">
        <span>${escapeAttr(c.nombre || 'Sin curso')}</span>
        <strong>${fmt(c.total)}</strong>
      </div>
    `, 'Sin recaudos por curso.');
  }

  const morosos = document.getElementById('finMorosos');
  if(morosos){
    const estudiantesDeuda = data.estudiantes_con_deuda || data.morosos || [];
    morosos.innerHTML = renderLista(estudiantesDeuda, m => `
      <div class="border-bottom py-2">
        <div class="d-flex justify-content-between gap-2">
          <span>${escapeAttr((m.nombre || '').toString().slice(0, 28))}</span>
          <strong class="text-danger">${fmt(m.deuda)}</strong>
        </div>
        <div class="text-muted">
          Ficha #${m.id} · ${escapeAttr(m.cedula || 'Sin cedula')} · ultimo abono: ${(m.ultimo_abono || 'sin abonos').toString().slice(0,10)}
          ${Number(m.registros_misma_cedula || 0) > 1 ? '<span class="text-warning"> · revisar duplicado</span>' : ''}
        </div>
      </div>
    `, 'Sin estudiantes con deuda.');
  }
}

async function generarAuditoriaIA(){
  const btn = document.getElementById('btnAuditoriaIA');
  if(btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Analizando'; }
  setAiMensaje('Analizando periodo seleccionado', 'bi-activity');
  setAiOutput('<div class="ai-placeholder">Revisando ingresos, utilidad, comparacion y estudiantes con deuda...</div>');

  try{
    const res = await fetch('/api/dashboard/ia-auditoria', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', Authorization:'Bearer ' + localStorage.getItem('token') },
      body: JSON.stringify({ periodo: periodoFinanzas })
    });
    const data = await res.json();
    setAiMensaje(data.modo === 'gemini' ? `Generado con ${data.modelo}` : (data.mensaje || 'Analisis local generado'), data.modo === 'gemini' ? 'bi-stars' : 'bi-info-circle');
    setAiOutput(markdownBasico(data.analisis || data.mensaje || 'Sin respuesta.'));
  }catch(e){
    setAiMensaje('Error al generar auditoria', 'bi-exclamation-triangle');
    setAiOutput('<div class="ai-placeholder">No se pudo generar la auditoria IA.</div>');
  }finally{
    if(btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-magic me-1"></i> Analizar'; }
  }
}
