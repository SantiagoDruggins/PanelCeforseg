<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard - CEFORSEG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  .card-acceso { transition: transform .15s; }
  .card-acceso:hover { transform: translateY(-2px); }
  .card-acceso a { text-decoration: none; color: inherit; display: block; padding: 1rem; }
  .card-acceso .h5 { margin: 0; }
  .card-acceso small { opacity: .85; }
  .card-acceso .icono{
    font-size:28px;
    width:44px;
    height:44px;
    border-radius:14px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:rgba(10,59,120,.06);
    color:#0a3b78;
    margin-bottom:6px;
  }
</style>
</head>

<body>
<script>
if(!localStorage.getItem('token')) location.href='/login';
</script>

<div id="app"></div>

<script>
function formatCOP(n){ if(n==null||n==='') return '$0 COP'; return '$' + Number(n).toLocaleString('es-CO') + ' COP'; }

fetch('/layout.html')
.then(r=>r.text())
.then(html=>{
  document.getElementById('app').innerHTML = html;
  const content = document.querySelector('.content');
  const rol = localStorage.getItem('rol') || '';

  if (rol === 'secretaria') {
    content.innerHTML = `
      <h3 class="fw-bold mb-3"><i class="bi bi-clipboard-check me-2"></i>Operativo</h3>
      <p class="text-muted mb-4">Accesos directos a lo que más usas.</p>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso border-primary">
            <a href="/matricular">
              <div class="icono"><i class="bi bi-plus-circle-fill"></i></div>
              <h5 class="mt-2">Matricular</h5>
              <small class="text-muted">Registrar nuevo estudiante y cursos</small>
            </a>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso border-primary">
            <a href="/estudiantes-panel">
              <div class="icono"><i class="bi bi-people-fill"></i></div>
              <h5 class="mt-2">Estudiantes</h5>
              <small class="text-muted">Buscar y ver fichas</small>
            </a>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso border-success">
            <a href="/cierre-caja">
              <div class="icono"><i class="bi bi-cash-coin"></i></div>
              <h5 class="mt-2">Cierre de caja</h5>
              <small class="text-muted">Conteo y cierre del día</small>
            </a>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso">
            <a href="/certificados-panel">
              <div class="icono"><i class="bi bi-file-earmark-text"></i></div>
              <h5 class="mt-2">Certificados</h5>
              <small class="text-muted">Subir y gestionar diplomas</small>
            </a>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow rounded-3 card-acceso">
            <a href="/validar">
              <div class="icono"><i class="bi bi-check2-circle"></i></div>
              <h5 class="mt-2">Validar certificado</h5>
              <small class="text-muted">Consultar por cédula</small>
            </a>
          </div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-md-4">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Recaudo hoy</small>
              <h4 class="text-success mb-0" id="recaudoHoy">$0 COP</h4>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Alumnos con deuda</small>
              <h4 class="mb-0" id="alumnosDeudores">0</h4>
            </div>
          </div>
        </div>
      </div>
    `;
  } else {
    content.innerHTML = `
      <h3 class="fw-bold mb-3"><i class="bi bi-shield-check me-2"></i>Auditoría y caja</h3>
      <p class="text-muted mb-4">Vista gerente: caja, movimientos y totales.</p>

      <div id="alertaCierre" class="alert alert-warning d-none mb-3">Aún no hay cierre de caja hoy. Revisa con la secretaria.</div>
      <div id="alertaCierreOk" class="alert alert-success d-none mb-3">Cierre de caja del día registrado.</div>

      <div class="row g-3 mb-4">
        <div class="col-md-3">
          <div class="card shadow rounded-3 border-success">
            <div class="card-body">
              <small>Recaudo hoy (total)</small>
              <h4 class="text-success mb-0" id="recaudoTotalHoy">$0 COP</h4>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Efectivo hoy</small>
              <h5 class="mb-0" id="efectivoHoy">$0 COP</h5>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Nequi hoy</small>
              <h5 class="mb-0" id="nequiHoy">$0 COP</h5>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Transferencias hoy</small>
              <h5 class="mb-0" id="transferenciaHoy">$0 COP</h5>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Total estudiantes</small>
              <h4 class="mb-0" id="totalEstudiantes">0</h4>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Deuda total</small>
              <h4 class="text-danger mb-0" id="deudaTotal">$0 COP</h4>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Alumnos con deuda</small>
              <h4 class="mb-0" id="alumnosDeudores">0</h4>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow rounded-3">
            <div class="card-body">
              <small>Último cierre</small>
              <h6 class="mb-0" id="ultimoCierreTexto">—</h6>
              <a href="/cierres-caja-panel" class="small">Ver historial</a>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow rounded-3 mb-4">
        <div class="card-header bg-dark text-white">Últimos abonos (movimientos)</div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover table-sm mb-0">
              <thead class="table-light">
                <tr>
                  <th>Fecha</th>
                  <th>Estudiante</th>
                  <th>Valor</th>
                  <th>Método</th>
                  <th>Factura</th>
                  <th>Registrado por</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="tablaUltimosAbonos">
                <tr><td colspan="7" class="text-center text-muted">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }

  fetch('/api/dashboard', { headers: { Authorization: 'Bearer ' + localStorage.getItem('token') } })
  .then(r=>r.json())
  .then(d=>{
    const fmt = typeof formatCOP === 'function' ? formatCOP : (n)=>'$'+Number(n).toLocaleString('es-CO')+' COP';
    if (document.getElementById('totalEstudiantes')) document.getElementById('totalEstudiantes').innerText = d.estudiantes;
    if (document.getElementById('recaudoHoy')) document.getElementById('recaudoHoy').innerText = fmt(d.recaudo_hoy);
    if (document.getElementById('deudaTotal')) document.getElementById('deudaTotal').innerText = fmt(d.deuda_total);
    if (document.getElementById('alumnosDeudores')) document.getElementById('alumnosDeudores').innerText = d.alumnos_deudores;
  });

  if (rol === 'gerente') {
    fetch('/api/dashboard/auditoria', { headers: { Authorization: 'Bearer ' + localStorage.getItem('token') } })
    .then(r=>r.json())
    .then(d=>{
      const fmt = typeof formatCOP === 'function' ? formatCOP : (n)=>'$'+Number(n).toLocaleString('es-CO')+' COP';
      if (document.getElementById('recaudoTotalHoy')) document.getElementById('recaudoTotalHoy').innerText = fmt(d.recaudo_hoy.total);
      if (document.getElementById('efectivoHoy')) document.getElementById('efectivoHoy').innerText = fmt(d.recaudo_hoy.efectivo);
      if (document.getElementById('nequiHoy')) document.getElementById('nequiHoy').innerText = fmt(d.recaudo_hoy.nequi);
      if (document.getElementById('transferenciaHoy')) document.getElementById('transferenciaHoy').innerText = fmt(d.recaudo_hoy.transferencia);

      if (d.cierre_hecho_hoy) {
        const el = document.getElementById('alertaCierreOk'); if (el) el.classList.remove('d-none');
      } else {
        const el = document.getElementById('alertaCierre'); if (el) el.classList.remove('d-none');
      }

      if (d.ultimo_cierre) {
        const c = d.ultimo_cierre;
        const txt = document.getElementById('ultimoCierreTexto');
        if (txt) txt.innerHTML = (c.fecha || '').slice(0,10) + ' · ' + fmt(c.total_sistema) + (c.usuario ? '<br><small>' + c.usuario + '</small>' : '');
      }

      const tbody = document.getElementById('tablaUltimosAbonos');
      if (tbody) {
        if (!d.ultimos_abonos || d.ultimos_abonos.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-muted">Sin abonos recientes</td></tr>';
        } else {
          tbody.innerHTML = d.ultimos_abonos.map(a=>`
            <tr
              data-abono-id="${a.id}"
              data-valor="${a.valor}"
              data-nota="${escapeAttr(a.nota || '')}"
              data-metodo="${escapeAttr(a.metodo_pago || 'efectivo')}"
              data-factura="${escapeAttr(a.numero_factura || '')}"
            >
              <td>${(a.fecha||'').toString().slice(0,16).replace('T',' ')}</td>
              <td>${(a.estudiante||'—').toString().slice(0,25)}</td>
              <td>${fmt(a.valor)}</td>
              <td>${(a.metodo_pago||'efectivo')}</td>
              <td>${(a.numero_factura||'—').toString().slice(0,12)}</td>
              <td>${(a.registrado_por||'—')}</td>
              <td>
                <div class="d-flex gap-1 justify-content-center">
                  <button class="btn btn-sm btn-outline-secondary" onclick="editarAbonoDashboard(this)">Editar</button>
                  <button class="btn btn-sm btn-outline-danger" onclick="eliminarAbonoDashboard(this)">Eliminar</button>
                </div>
              </td>
            </tr>
          `).join('');
        }
      }
    });
  }
});

function escapeAttr(s){
  return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function editarAbonoDashboard(btn){
  const tr = btn.closest('tr');
  const id = tr.getAttribute('data-abono-id');
  const valor = tr.getAttribute('data-valor');
  const nota = tr.getAttribute('data-nota') || '';
  const metodo = tr.getAttribute('data-metodo') || 'efectivo';
  const factura = tr.getAttribute('data-factura') || '';

  const v = prompt('Valor del abono:', valor);
  if(v === null) return;

  const n = prompt('Número de factura (obligatorio):', factura);
  if(n === null) return;
  if(!n.toString().trim()){ alert('El número de factura es obligatorio.'); return; }

  const no = prompt('Nota:', nota);
  if(no === null) return;

  const met = prompt('Método de pago:', metodo);
  if(met === null) return;

  fetch('/api/abonos/' + id, {
    method:'PUT',
    headers:{ 'Content-Type':'application/json', Authorization:'Bearer ' + localStorage.getItem('token') },
    body: JSON.stringify({ valor: v, nota: no, metodo_pago: met, numero_factura: n })
  })
  .then(r=>r.json())
  .then(data=>{
    alert(data.mensaje || 'Actualizado');
    location.reload();
  });
}

function eliminarAbonoDashboard(btn){
  const tr = btn.closest('tr');
  const id = tr.getAttribute('data-abono-id');

  if(!confirm('¿Eliminar este abono? Se restituirá el saldo al curso.')) return;

  fetch('/api/abonos/' + id, {
    method:'DELETE',
    headers:{ Authorization:'Bearer ' + localStorage.getItem('token') }
  })
  .then(r=>r.json())
  .then(data=>{
    alert(data.mensaje || 'Eliminado');
    location.reload();
  });
}
</script>
</body>
</html>
