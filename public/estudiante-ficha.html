<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ficha del Estudiante - CEFORSEG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  .vf-wrap{
    border:1px solid rgba(10,59,120,.10);
    border-radius:16px;
    background:rgba(255,255,255,.75);
    box-shadow:0 10px 24px rgba(2,6,23,.08);
  }
  .vf-header{
    background:linear-gradient(180deg, rgba(10,59,120,.06) 0%, rgba(10,59,120,.02) 100%);
    border-bottom:1px solid rgba(10,59,120,.10);
    padding:16px 18px;
    border-radius:16px 16px 0 0;
  }
  .vf-title{
    font-weight:900;
    color:#0a3b78;
    margin:0;
  }
  .vf-subtitle{
    margin:0;
    color:#475569;
    font-weight:600;
    font-size:13px;
  }
  .vf-info{
    background:#fff;
    border:1px solid rgba(2,6,23,.06);
    border-radius:14px;
    padding:12px 14px;
  }
  .vf-label{
    display:block;
    color:#64748b;
    font-weight:700;
    font-size:12px;
    margin-bottom:4px;
  }
  .vf-value{
    font-weight:800;
    color:#0f172a;
    word-break:break-word;
  }
  .vf-actions .btn{
    border-radius:12px;
    font-weight:700;
  }
  .curso-card .card{
    border:1px solid rgba(2,6,23,.06);
    border-radius:14px;
  }
</style>
</head>

<body>

<script>
if(!localStorage.getItem('token')){
  location.href='/login';
}
</script>

<div id="app"></div>

<script>
const token = localStorage.getItem('token');
const params = new URLSearchParams(location.search);
const id = params.get('id');
const editMode = params.get('edit') === '1';

fetch('/layout.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('app').innerHTML = html;
    cargarFicha();
  });

async function cargarFicha(){
  const res = await fetch('/api/estudiantes/' + id, {
    headers:{ Authorization:'Bearer ' + token }
  });
  const e = await res.json();

  const content = document.querySelector('.content');

  content.innerHTML = `
    <a href="/estudiantes-panel" class="btn btn-outline-secondary mb-3"><i class="bi bi-arrow-left me-1"></i>Volver</a>

    <div class="vf-wrap mb-4">
      <div class="vf-header">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div>
            <h5 class="vf-title mb-1">Ficha del Estudiante</h5>
            <p class="vf-subtitle mb-0">Consulta y gestión de datos / abonos</p>
          </div>
        </div>
      </div>
      <div class="card-body row g-3">
        <div class="col-md-4 text-center">
          <img src="${e.foto || ''}" class="img-fluid rounded border mb-2">
        </div>

        <div class="col-md-8">
          ${editMode ? `
            <input id="nombre" class="form-control mb-2" value="${e.nombre}">
            <input id="telefono" class="form-control mb-2" placeholder="Teléfono" value="${e.telefono || ''}">
            <input id="email" class="form-control mb-2" type="email" placeholder="Correo" value="${e.email || ''}">
            <input id="ciudad" class="form-control mb-2" placeholder="Ciudad" value="${e.ciudad || ''}">
            <input id="direccion" class="form-control mb-2" placeholder="Dirección" value="${e.direccion || ''}">
            <input id="contacto_emergencia" class="form-control mb-2" placeholder="En caso de accidente llamar a" value="${e.contacto_emergencia || ''}">
            <input id="fecha_matricula" class="form-control mb-2" type="date" value="${e.fecha_matricula || ''}">
            <button class="btn btn-warning" onclick="guardarCambios()"><i class="bi bi-save2 me-1"></i>Guardar cambios</button>

            <hr class="my-3">

            <div class="vf-info">
              <span class="vf-label mb-2">Agregar más cursos (paquetes)</span>

              <select id="nuevo_curso_id" class="form-select mb-2">
                <option value="">Cargando cursos...</option>
              </select>

              <button class="btn btn-primary w-100" onclick="agregarCursoEstudiante()">
                <i class="bi bi-plus-circle me-1"></i>Agregar curso
              </button>

              <div id="msgAgregarCurso" class="text-muted small mt-2"></div>
            </div>
          ` : `
            <h4 class="mb-3 fw-bold">${e.nombre}</h4>

            <div class="row g-2 mb-3">
              <div class="col-md-6">
                <span class="vf-label">Cédula</span>
                <div class="vf-value">${e.cedula}</div>
              </div>
              <div class="col-md-6">
                <span class="vf-label">Teléfono</span>
                <div class="vf-value">${e.telefono || '-'}</div>
              </div>
              <div class="col-md-6">
                <span class="vf-label">Correo</span>
                <div class="vf-value">${e.email || '-'}</div>
              </div>
              <div class="col-md-6">
                <span class="vf-label">Ciudad</span>
                <div class="vf-value">${e.ciudad || '-'}</div>
              </div>
              <div class="col-12">
                <span class="vf-label">Dirección</span>
                <div class="vf-value">${e.direccion || '-'}</div>
              </div>
              <div class="col-12">
                <span class="vf-label">Contacto de emergencia</span>
                <div class="vf-value">${e.contacto_emergencia || '-'}</div>
              </div>
              <div class="col-12">
                <span class="vf-label">Fecha matrícula</span>
                <div class="vf-value">${e.fecha_matricula || '-'}</div>
              </div>
            </div>

            <div class="vf-actions d-flex gap-2 flex-wrap">
              <a href="/estudiante-ficha?id=${id}&edit=1" class="btn btn-warning"><i class="bi bi-pencil-square me-1"></i>Editar estudiante</a>
              <a href="/ficha-imprimir?id=${id}" target="_blank" class="btn btn-outline-primary ms-0"><i class="bi bi-printer me-1"></i>Imprimir ficha</a>
            </div>
          `}
        </div>
      </div>
    </div>

    <h5 class="mb-3 mt-2 fw-bold"><i class="bi bi-mortarboard me-2"></i>Cursos matriculados</h5>
    <div id="listaCursos"></div>
    <div id="resumenCursos" class="vf-info mb-4">
      <div class="row g-2">
        <div class="col-md-6">
          <span class="vf-label mb-1">Valor total</span>
          <div class="vf-value" id="valorTotalCursos">—</div>
        </div>
        <div class="col-md-6">
          <span class="vf-label mb-1">Saldo total</span>
          <div class="vf-value" id="saldoTotalCursos">—</div>
        </div>
      </div>
    </div>

    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <h5><i class="bi bi-cash-coin me-2"></i>Registrar abono</h5>
        <p class="text-muted small mb-2">Todo movimiento de dinero debe tener número de factura.</p>

        <label class="form-label fw-bold">Número de factura <span class="text-danger">*</span></label>
        <input id="numero_factura" class="form-control mb-2" placeholder="Ej: FAC 5693" required>

        <select id="curso_id" class="form-select mb-2">
          <option value="">Seleccione curso</option>
        </select>

        <input id="valor" type="number" class="form-control mb-2" placeholder="Valor del abono">

        <select id="metodo_pago" class="form-select mb-2">
          <option value="efectivo">Efectivo</option>
          <option value="nequi">Nequi</option>
          <option value="Daviplata">Daviplata</option>
          <option value="Bancolombia">Transferencia - Bancolombia</option>
          <option value="Davivienda">Transferencia - Davivienda</option>
          <option value="BBVA">Transferencia - BBVA Colombia</option>
          <option value="Banco de Bogotá">Transferencia - Banco de Bogotá</option>
          <option value="Banco Popular">Transferencia - Banco Popular</option>
          <option value="AV Villas">Transferencia - AV Villas</option>
          <option value="Caja Social">Transferencia - Banco Caja Social</option>
          <option value="Pichincha">Transferencia - Banco Pichincha</option>
          <option value="Bancoomeva">Transferencia - Bancoomeva</option>
          <option value="Itaú">Transferencia - Banco Itaú</option>
          <option value="Scotiabank Colpatria">Transferencia - Scotiabank Colpatria</option>
          <option value="GNB Sudameris">Transferencia - GNB Sudameris</option>
          <option value="Banco Agrario">Transferencia - Banco Agrario</option>
          <option value="Banco Cooperativo Coopcentral">Transferencia - Coopcentral</option>
          <option value="Banco Falabella">Transferencia - Banco Falabella</option>
          <option value="Banco W">Transferencia - Banco W</option>
          <option value="Banco Serfinanza">Transferencia - Serfinanza</option>
          <option value="Banco Finandina">Transferencia - Finandina</option>
          <option value="Banco Credifinanciera">Transferencia - Credifinanciera</option>
          <option value="Otro banco">Transferencia - Otro banco</option>
        </select>

        <input id="nota" class="form-control mb-2" placeholder="Nota">

        <button class="btn btn-success w-100" onclick="registrarAbono()">Agregar abono</button>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-striped mb-0">
          <thead class="table-dark">
            <tr>
              <th>Factura <span class="text-warning" title="Obligatorio">*</span></th>
              <th>Fecha</th>
              <th>Curso</th>
              <th>Valor</th>
              <th>Método</th>
              <th>Nota</th>
              <th>Usuario</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaAbonos"></tbody>
        </table>
      </div>
    </div>
  `;

  renderCursos(e.cursos);
  cargarAbonos();

  if(editMode){
    cargarCursosDisponiblesParaAgregar(e.cursos);
  }
}

function renderCursos(cursos){
  const cont = document.getElementById('listaCursos');
  const select = document.getElementById('curso_id');
  const elValorTotal = document.getElementById('valorTotalCursos');
  const elSaldoTotal = document.getElementById('saldoTotalCursos');

  cont.innerHTML = '';
  select.innerHTML = '<option value="">Seleccione curso</option>';

  const totalPrecio = (cursos || []).reduce((acc, c) => acc + Number(c.precio || 0), 0);
  const totalSaldo = (cursos || []).reduce((acc, c) => acc + Number(c.saldo || 0), 0);
  const fmt = (v) => {
    if(typeof formatCOP === 'function') return formatCOP(v);
    return '$' + Number(v).toLocaleString('es-CO') + ' COP';
  };

  if(elValorTotal) elValorTotal.textContent = fmt(totalPrecio);
  if(elSaldoTotal) elSaldoTotal.textContent = fmt(totalSaldo);

  cursos.forEach(c => {
    cont.innerHTML += `
      <div class="card mb-3 shadow-sm">
        <div class="card-body">
          <h6>${c.nombre}</h6>
          <p><b>Precio:</b> ${typeof formatCOP === 'function' ? formatCOP(c.precio) : '$' + Number(c.precio).toLocaleString('es-CO') + ' COP'}</p>
          <p><b>Saldo:</b> ${typeof formatCOP === 'function' ? formatCOP(c.saldo) : '$' + Number(c.saldo).toLocaleString('es-CO') + ' COP'}</p>
        </div>
      </div>
    `;
    select.innerHTML += `<option value="${c.curso_id}">${c.nombre}</option>`;
  });
}

async function cargarAbonos(){
  const res = await fetch('/api/abonos/' + id,{
    headers:{ Authorization:'Bearer ' + token }
  });
  const abonos = await res.json();

  const tabla = document.getElementById('tablaAbonos');
  tabla.innerHTML = '';

  abonos.forEach(a=>{
    const factura = (a.numero_factura || '-').toString().replace(/</g,'&lt;');
    const nota = (a.nota || '-').toString().replace(/</g,'&lt;');
    const metodo = (a.metodo_pago || 'efectivo').toString().replace(/"/g,'&quot;');
    const facturaAttr = (a.numero_factura || '').toString().replace(/"/g,'&quot;');
    const notaAttr = (a.nota || '').toString().replace(/"/g,'&quot;');
    tabla.innerHTML += `
      <tr data-abono-id="${a.id}" data-valor="${a.valor}" data-nota="${notaAttr}" data-metodo="${metodo}" data-factura="${facturaAttr}">
        <td>${factura}</td>
        <td>${new Date(a.fecha).toLocaleDateString()}</td>
        <td>${a.curso || '-'}</td>
        <td>${typeof formatCOP === 'function' ? formatCOP(a.valor) : '$' + Number(a.valor).toLocaleString('es-CO') + ' COP'}</td>
        <td>${a.metodo_pago || 'efectivo'}</td>
        <td>${nota}</td>
        <td>${a.usuario || '-'}</td>
        <td class="btns-abono">
          ${localStorage.getItem('rol') === 'gerente' ? `
          <button class="btn btn-sm btn-outline-secondary me-1" onclick="editarAbonoDesdeFila(this)">Editar</button>
          <button class="btn btn-sm btn-outline-danger" onclick="eliminarAbono(${a.id})">Eliminar</button>
          ` : '<span class="text-muted small">Solo gerente puede editar/eliminar</span>'}
        </td>
      </tr>
    `;
  });
}

async function registrarAbono(){
  const numero_factura = document.getElementById('numero_factura').value.trim();
  const curso_id = document.getElementById('curso_id').value;
  const valor = document.getElementById('valor').value;
  const nota = document.getElementById('nota').value;
  const metodo_pago = document.getElementById('metodo_pago').value;

  if(!numero_factura){
    alert('El número de factura es obligatorio');
    return;
  }
  if(!curso_id || !valor){
    alert('Seleccione curso y valor');
    return;
  }

  const res = await fetch('/api/abonos',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer ' + token
    },
    body: JSON.stringify({
      estudiante_id: id,
      curso_id,
      valor,
      nota,
      metodo_pago,
      numero_factura
    })
  });
  const data = await res.json();
  if(!res.ok){ alert(data.mensaje || 'Error'); return; }
  document.getElementById('numero_factura').value = '';
  document.getElementById('valor').value = '';
  document.getElementById('nota').value = '';
  cargarFicha();
}

function editarAbonoDesdeFila(btn){
  const row = btn.closest('tr');
  const idAbono = row.getAttribute('data-abono-id');
  const valor = row.getAttribute('data-valor');
  const nota = row.getAttribute('data-nota') || '';
  const metodo = row.getAttribute('data-metodo') || 'efectivo';
  const factura = row.getAttribute('data-factura') || '';

  const v = prompt('Valor del abono:', valor);
  if(v === null) return;
  const n = prompt('Número de factura (obligatorio):', factura);
  if(n === null) return;
  if(!n.trim()){ alert('El número de factura es obligatorio.'); return; }
  const no = prompt('Nota:', nota);
  if(no === null) return;
  const met = prompt('Método de pago:', metodo);
  if(met === null) return;

  fetch('/api/abonos/' + idAbono, {
    method:'PUT',
    headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + token },
    body: JSON.stringify({ valor: v, nota: no, metodo_pago: met, numero_factura: n })
  }).then(r=>r.json()).then(data=>{
    alert(data.mensaje || 'Actualizado');
    cargarFicha();
  });
}

async function eliminarAbono(idAbono){
  if(!confirm('¿Eliminar este abono? Se restituirá el saldo al curso.')) return;
  const res = await fetch('/api/abonos/' + idAbono, { method:'DELETE', headers:{ 'Authorization':'Bearer ' + token } });
  const data = await res.json();
  alert(data.mensaje || 'Eliminado');
  if(res.ok) cargarFicha();
}

async function guardarCambios(){
  const payload = {
    nombre: document.getElementById('nombre').value,
    telefono: document.getElementById('telefono').value,
    email: document.getElementById('email').value || null,
    ciudad: document.getElementById('ciudad').value,
    direccion: document.getElementById('direccion').value,
    contacto_emergencia: document.getElementById('contacto_emergencia').value || null,
    fecha_matricula: document.getElementById('fecha_matricula').value || null
  };
  const res = await fetch('/api/estudiantes/' + id, {
    method:'PUT',
    headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + token },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  alert(data.mensaje);
  if(res.ok) location.href = '/estudiante-ficha?id=' + id;
}

async function cargarCursosDisponiblesParaAgregar(cursosActuales){
  const select = document.getElementById('nuevo_curso_id');
  const msg = document.getElementById('msgAgregarCurso');
  if(!select) return;

  select.innerHTML = '<option value="">Seleccione un curso</option>';
  if(msg) msg.textContent = '';

  const idsActuales = new Set((cursosActuales || []).map(c => String(c.curso_id)));

  const res = await fetch('/api/cursos', {
    headers:{ Authorization:'Bearer ' + token }
  });
  const cursos = await res.json();

  const disponibles = (cursos || []).filter(c => !idsActuales.has(String(c.id)));

  if(!disponibles.length){
    select.innerHTML = '<option value="">No hay cursos disponibles</option>';
    if(msg) msg.textContent = 'El estudiante ya tiene todos los cursos activos.';
    return;
  }

  disponibles.forEach(c => {
    select.innerHTML += `<option value="${c.id}">${c.nombre} - ${typeof formatCOP === 'function' ? formatCOP(c.precio) : '$' + Number(c.precio).toLocaleString('es-CO') + ' COP'}</option>`;
  });
}

async function agregarCursoEstudiante(){
  const curso_id = document.getElementById('nuevo_curso_id').value;
  const msg = document.getElementById('msgAgregarCurso');

  if(!curso_id){
    if(msg) msg.textContent = 'Seleccione un curso para agregar.';
    alert('Seleccione un curso para agregar.');
    return;
  }

  const res = await fetch('/api/estudiantes/' + id + '/curso', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer ' + token
    },
    body: JSON.stringify({ curso_id })
  });

  const data = await res.json();
  if(!res.ok){
    alert(data.mensaje || 'Error al agregar curso');
    return;
  }

  // Recargamos la ficha para que se refleje el nuevo curso y el saldo.
  cargarFicha();
}
</script>

</body>
</html>
