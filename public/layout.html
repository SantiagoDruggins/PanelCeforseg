<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CEFORSEG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
:root{
  --sidebar-width: 230px;
  --azul:#0a3b78;
}

body{
  margin:0;
  background:#f4f6f9;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

.app{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-width);
  background:linear-gradient(180deg, #0a3b78 0%, #083063 100%);
  color:#fff;
  padding:20px 15px;
  flex-shrink:0;
  border-right:1px solid rgba(255,255,255,.12);
}

/* LOGO */
.logo-box{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.logo-box img{
  width:38px;
  height:38px;
  object-fit:contain;
}

.logo-box span{
  font-weight:700;
  font-size:18px;
}

/* MENU */
.sidebar a{
  color:#fff;
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:12px;
  margin-bottom:8px;
  font-size:15px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  transition: background-color .15s ease, transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}

.sidebar a:hover{
  background:rgba(255,255,255,.12);
  transform: translateY(-1px);
  box-shadow: 0 10px 22px rgba(0,0,0,.22);
  border-color: rgba(255,255,255,.18);
}

.sidebar a i{
  font-size:16px;
  width:22px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  opacity:.95;
}

.sidebar hr{
  border-color:rgba(255,255,255,.25);
  margin:18px 0;
}

/* CONTENIDO */
.content{
  flex:1;
  padding:24px;
  background:#f4f6f9;
}

@media(max-width:768px){
  .sidebar{
    width:100%;
  }
  .app{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- LOGO -->
    <div class="logo-box">
      <img src="../assets/descarga-Photoroom.png" alt="CEFORSEG">
      <span>CEFORSEG</span>
    </div>

    <hr>

    <a href="/dashboard"><i class="bi bi-speedometer2"></i><span>Resumen</span></a>
    <a href="/estudiantes-panel"><i class="bi bi-people"></i><span>Estudiantes</span></a>
    <a href="/deudores-panel"><i class="bi bi-exclamation-triangle"></i><span>Deudores / Morosos</span></a>
    <a href="/matricular"><i class="bi bi-plus-circle"></i><span>Matricular</span></a>
    <a href="/cursos-panel"><i class="bi bi-journal-text"></i><span>Cursos</span></a>
    <a href="/certificados-panel"><i class="bi bi-file-earmark-text"></i><span>Certificados</span></a>
    <a href="/diplomas-generador"><i class="bi bi-card-list"></i><span>Generador de Diplomas</span></a>
    <a href="/usuarios-panel" id="menuUsuarios"><i class="bi bi-person-badge"></i><span>Usuarios</span></a>
    <a href="/auditoria-panel" id="menuAuditoria"><i class="bi bi-shield-check"></i><span>Auditoría</span></a>
    <a href="/nomina-panel" id="menuNomina"><i class="bi bi-cash-coin"></i><span>Nómina</span></a>
    <a href="/cierre-caja"><i class="bi bi-currency-exchange"></i><span>Cierre de Caja</span></a>
    <a href="/cierres-caja-panel"><i class="bi bi-clock-history"></i><span>Historial Cierres</span></a>


    <hr>

    <a href="/login" id="btnLogout" onclick="localStorage.clear(); location.href='/login'; return false;"><i class="bi bi-box-arrow-right"></i><span>Salir</span></a>

  </aside>

  <!-- CONTENIDO -->
  <main class="content"></main>

</div>

<script>
function formatCOP(n){ if(n==null||n==='') return '$0 COP'; return '$' + Number(n).toLocaleString('es-CO') + ' COP'; }
if(localStorage.getItem('rol') !== 'gerente'){
  const u = document.getElementById('menuUsuarios');
  if(u) u.style.display='none';
  const aud = document.getElementById('menuAuditoria');
  if(aud) aud.style.display='none';
  const nom = document.getElementById('menuNomina');
  if(nom) nom.style.display='none';
}
</script>

</body>
</html>
