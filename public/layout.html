<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CEFORSEG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
  --sidebar-width: 230px;
  --azul:#0a3b78;
}

body{
  margin:0;
  background:#f4f6f9;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

.app{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-width);
  background:var(--azul);
  color:#fff;
  padding:20px 15px;
  flex-shrink:0;
}

/* LOGO */
.logo-box{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.logo-box img{
  width:38px;
  height:38px;
  object-fit:contain;
}

.logo-box span{
  font-weight:700;
  font-size:18px;
}

/* MENU */
.sidebar a{
  color:#fff;
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:6px;
  margin-bottom:6px;
  font-size:15px;
}

.sidebar a:hover{
  background:rgba(255,255,255,.18);
}

.sidebar hr{
  border-color:rgba(255,255,255,.25);
}

/* CONTENIDO */
.content{
  flex:1;
  padding:24px;
  background:#f4f6f9;
}

@media(max-width:768px){
  .sidebar{
    width:100%;
  }
  .app{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- LOGO -->
    <div class="logo-box">
      <img src="../assets/descarga-Photoroom.png" alt="CEFORSEG">
      <span>CEFORSEG</span>
    </div>

    <hr>

    <a href="/dashboard">📊 <span>Resumen</span></a>
    <a href="/estudiantes-panel">👥 <span>Estudiantes</span></a>
    <a href="/deudores-panel">📋 <span>Deudores / Morosos</span></a>
    <a href="/matricular">➕ <span>Matricular</span></a>
    <a href="/cursos-panel">📚 <span>Cursos</span></a>
    <a href="/certificados-panel">📄 <span>Certificados</span></a>
    <a href="/usuarios-panel" id="menuUsuarios">👤 <span>Usuarios</span></a>
    <a href="/auditoria-panel" id="menuAuditoria">🔒 <span>Auditoría</span></a>
    <a href="/nomina-panel" id="menuNomina">📋 <span>Nómina</span></a>
    <a href="/cierre-caja">💰 <span>Cierre de Caja</span></a>
    <a href="/cierres-caja-panel">📋 <span>Historial Cierres</span></a>


    <hr>

    <a href="/login" id="btnLogout" onclick="localStorage.clear(); location.href='/login'; return false;">🚪 <span>Salir</span></a>

  </aside>

  <!-- CONTENIDO -->
  <main class="content"></main>

</div>

<script>
function formatCOP(n){ if(n==null||n==='') return '$0 COP'; return '$' + Number(n).toLocaleString('es-CO') + ' COP'; }
if(localStorage.getItem('rol') !== 'gerente'){
  const u = document.getElementById('menuUsuarios');
  if(u) u.style.display='none';
  const aud = document.getElementById('menuAuditoria');
  if(aud) aud.style.display='none';
  const nom = document.getElementById('menuNomina');
  if(nom) nom.style.display='none';
}
</script>

</body>
</html>
