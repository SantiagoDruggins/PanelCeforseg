<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Usuarios - CEFORSEG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<script>
// 🔒 SOLO GERENTE
if(localStorage.getItem('rol') !== 'gerente'){
  location.href = '/dashboard';
}
if(!localStorage.getItem('token')){
  location.href = '/login';
}
</script>

<div id="app"></div>

<script>
const token = localStorage.getItem('token');

fetch('/layout.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('app').innerHTML = html;
    const content = document.querySelector('.content');

    content.innerHTML = `
      <h3 class="mb-4">👤 Gestión de Usuarios</h3>

      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <h6 class="mb-3">Crear nuevo usuario</h6>

          <form id="formUsuario">
            <div class="row g-3">
              <div class="col-md-4">
                <input id="usuario" class="form-control" placeholder="Usuario" required>
              </div>
              <div class="col-md-4">
                <input id="password" type="password" class="form-control" placeholder="Contraseña" required>
              </div>
              <div class="col-md-4">
                <select id="rol" class="form-select" required>
                  <option value="">Rol</option>
                  <option value="secretaria">Secretaria</option>
                  <option value="gerente">Gerente</option>
                </select>
              </div>
            </div>

            <button class="btn btn-primary mt-3">Crear usuario</button>
          </form>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-striped mb-0 align-middle text-center">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Rol</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaUsuarios"></tbody>
          </table>
      </div>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Editar usuario</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="editId">
            <div class="mb-2">
              <label class="form-label">Usuario</label>
              <input type="text" id="editUsuario" class="form-control" placeholder="Usuario">
            </div>
            <div class="mb-2">
              <label class="form-label">Rol</label>
              <select id="editRol" class="form-select">
                <option value="secretaria">Secretaria</option>
                <option value="gerente">Gerente</option>
              </select>
            </div>
            <div class="mb-2">
              <label class="form-label">Nueva contraseña (dejar vacío para no cambiar)</label>
              <input type="password" id="editPassword" class="form-control" placeholder="Contraseña">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" onclick="guardarEdicionUsuario()">Guardar</button>
          </div>
        </div>
      </div>
    </div>
    `;

    cargarUsuarios();
    registrarFormulario();
  });

/* 🔄 LISTAR USUARIOS */
async function cargarUsuarios(){
  const res = await fetch('/api/usuarios', {
    headers:{ Authorization:'Bearer '+token }
  });
  const usuarios = await res.json();
  const tabla = document.getElementById('tablaUsuarios');
  tabla.innerHTML = '';

  const usuarioActual = localStorage.getItem('usuario') || '';

  usuarios.forEach(u => {
    const esActual = String(u.usuario || '') === usuarioActual;
    const eliminar = esActual
      ? '<span class="text-muted" title="No puedes eliminar tu propio usuario">—</span>'
      : `<button class="btn btn-danger btn-sm" onclick="eliminarUsuario(${u.id})">Eliminar</button>`;

    tabla.innerHTML += `
      <tr data-id="${u.id}" data-usuario="${(u.usuario||'').replace(/"/g,'&quot;')}" data-rol="${u.rol||''}">
        <td>${u.id}</td>
        <td>${u.usuario}</td>
        <td>${u.rol}</td>
        <td>
          <div class="d-flex gap-1 justify-content-center flex-wrap">
            <button class="btn btn-outline-primary btn-sm" onclick="editarUsuarioDesdeFila(this)">Editar</button>
            ${esActual ? '' : `<button class="btn btn-danger btn-sm" onclick="eliminarUsuario(${u.id})">Eliminar</button>`}
          </div>
        </td>
      </tr>
    `;
  });
}

/* ➕ CREAR USUARIO */
function registrarFormulario(){
  document.getElementById('formUsuario').addEventListener('submit', async e=>{
    e.preventDefault();

    const usuario = document.getElementById('usuario').value;
    const password = document.getElementById('password').value;
    const rol = document.getElementById('rol').value;

    const res = await fetch('/api/usuarios', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+token
      },
      body: JSON.stringify({ usuario, password, rol })
    });

    const data = await res.json();
    alert(data.mensaje);

    e.target.reset();
    cargarUsuarios();
  });
}

function editarUsuarioDesdeFila(btn){
  const row = btn.closest('tr');
  const id = row.getAttribute('data-id');
  const usuario = row.getAttribute('data-usuario') || '';
  const rol = row.getAttribute('data-rol') || 'secretaria';
  document.getElementById('editId').value = id;
  document.getElementById('editUsuario').value = usuario;
  document.getElementById('editRol').value = rol;
  document.getElementById('editPassword').value = '';
  new bootstrap.Modal(document.getElementById('modalEditar')).show();
}

async function guardarEdicionUsuario(){
  const id = document.getElementById('editId').value;
  const usuario = document.getElementById('editUsuario').value.trim();
  const rol = document.getElementById('editRol').value;
  const password = document.getElementById('editPassword').value;

  if(!usuario){ alert('El usuario es obligatorio'); return; }

  const body = { usuario, rol };
  if(password) body.password = password;

  const res = await fetch('/api/usuarios/'+id, {
    method:'PUT',
    headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  alert(data.mensaje);
  if(res.ok){
    bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
    cargarUsuarios();
  }
}

async function eliminarUsuario(id){
  if(!confirm('¿Eliminar este usuario?')) return;

  const res = await fetch('/api/usuarios/'+id, {
    method:'DELETE',
    headers:{ Authorization:'Bearer '+token }
  });

  const data = await res.json();
  alert(data.mensaje);
  cargarUsuarios();
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
