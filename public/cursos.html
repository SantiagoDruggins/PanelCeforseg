<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cursos - CEFORSEG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<script>
if(!localStorage.getItem('token')){
  location.href='/login';
}
</script>

<div id="app"></div>

<script>
const token = localStorage.getItem('token');
let cursoEditId = null;

fetch('/layout.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('app').innerHTML = html;
    const content = document.querySelector('.content');

    content.innerHTML = `
      <h3 class="mb-4">📚 Gestión de Cursos</h3>

      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <div class="row g-2">
            <div class="col-md-4">
              <input id="nombre" class="form-control" placeholder="Nombre del curso">
            </div>
            <div class="col-md-4">
              <input id="precio" type="number" class="form-control" placeholder="Precio">
            </div>
            <div class="col-md-4">
              <input id="descripcion" class="form-control" placeholder="Descripción del curso">
            </div>
          </div>
          <button class="btn btn-primary mt-3 me-2" id="btnGuardarCurso" onclick="crearCurso()">
            Guardar curso
          </button>
          <button class="btn btn-outline-secondary mt-3 d-none" id="btnCancelarEditar" onclick="cancelarEditar()">
            Cancelar
          </button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered align-middle">
          <thead class="table-dark">
            <tr>
              <th>Curso</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaCursos"></tbody>
        </table>
      </div>
    `;

    cargarCursos();
  });

async function cargarCursos(){
  const res = await fetch('/api/cursos', {
    headers:{ Authorization:'Bearer '+token }
  });
  const data = await res.json();

  const tabla = document.getElementById('tablaCursos');
  tabla.innerHTML = '';

  data.forEach(c => {
    tabla.innerHTML += `
      <tr>
        <td>
          <strong>${c.nombre}</strong><br>
          <small class="text-muted">
            ${c.descripcion && c.descripcion.trim() !== ''
              ? c.descripcion
              : 'Sin descripción'}
          </small>
        </td>
        <td>${typeof formatCOP === 'function' ? formatCOP(c.precio) : '$' + Number(c.precio).toLocaleString('es-CO') + ' COP'}</td>
        <td>
          <button class="btn btn-outline-primary btn-sm me-1" onclick="editarCurso(${c.id})">
            Editar
          </button>
          <button class="btn btn-danger btn-sm" onclick="eliminarCurso(${c.id})">
            Eliminar
          </button>
        </td>
      </tr>
    `;
  });
}

async function editarCurso(id){
  const res = await fetch('/api/cursos/' + id, { headers: { Authorization: 'Bearer ' + token } });
  const c = await res.json();
  if (!res.ok) { alert(c.mensaje || 'Curso no encontrado'); return; }
  cursoEditId = id;
  document.getElementById('nombre').value = c.nombre || '';
  document.getElementById('precio').value = c.precio ?? '';
  document.getElementById('descripcion').value = c.descripcion || '';
  document.getElementById('btnGuardarCurso').textContent = 'Actualizar curso';
  document.getElementById('btnGuardarCurso').setAttribute('onclick', 'actualizarCurso()');
  document.getElementById('btnCancelarEditar').classList.remove('d-none');
}

function cancelarEditar(){
  cursoEditId = null;
  document.getElementById('nombre').value = '';
  document.getElementById('precio').value = '';
  document.getElementById('descripcion').value = '';
  document.getElementById('btnGuardarCurso').textContent = 'Guardar curso';
  document.getElementById('btnGuardarCurso').setAttribute('onclick', 'crearCurso()');
  document.getElementById('btnCancelarEditar').classList.add('d-none');
}

async function actualizarCurso(){
  const nombreEl = document.getElementById('nombre');
  const precioEl = document.getElementById('precio');
  const descripcionEl = document.getElementById('descripcion');
  if (!cursoEditId || !nombreEl.value.trim() || !precioEl.value) {
    alert('Nombre y precio son obligatorios');
    return;
  }
  await fetch('/api/cursos/' + cursoEditId, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify({
      nombre: nombreEl.value.trim(),
      descripcion: descripcionEl.value.trim() || null,
      precio: precioEl.value
    })
  });
  cancelarEditar();
  cargarCursos();
}

async function crearCurso(){
  const nombreEl = document.getElementById('nombre');
  const precioEl = document.getElementById('precio');
  const descripcionEl = document.getElementById('descripcion');
  if(!nombreEl.value.trim() || !precioEl.value){
    alert('Nombre y precio son obligatorios');
    return;
  }

  await fetch('/api/cursos', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+token
    },
    body: JSON.stringify({
      nombre: nombreEl.value.trim(),
      descripcion: descripcionEl.value.trim() || null,
      precio: precioEl.value
    })
  });

  nombreEl.value = '';
  descripcionEl.value = '';
  precioEl.value = '';
  cargarCursos();
}

async function eliminarCurso(id){
  if(!confirm('¿Eliminar este curso?')) return;

  await fetch('/api/cursos/'+id, {
    method:'DELETE',
    headers:{ Authorization:'Bearer '+token }
  });
  cargarCursos();
}
</script>

</body>
</html>
