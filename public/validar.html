<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Validar Certificados | CEFORSEG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  margin:0;
  min-height:100vh;
  background:transparent;
  display:block;
}

.card{
  width:100%;
  max-width:1000px;
  background:#fff;
  border-radius:22px;
  padding:40px;
  box-shadow:0 40px 80px rgba(0,0,0,.3);
}

h2{text-align:center;margin-bottom:6px}
.subtitle{text-align:center;color:#555;margin-bottom:30px}

.search{
  display:flex;
  gap:14px;
}

.search input{
  flex:1;
  padding:18px;
  font-size:16px;
  border-radius:16px;
  border:1px solid #cbd5e1;
  background:#eef4ff;
}

.search button{
  padding:18px 34px;
  border:none;
  border-radius:16px;
  background:#2563eb;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.search button:hover{background:#1e40af}

#resultado{margin-top:32px}

.success{
  background:#ecfdf5;
  border:1px solid #10b981;
  padding:18px;
  border-radius:16px;
  color:#065f46;
  margin-bottom:22px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:10px;
}

.error{
  background:#fef2f2;
  border:1px solid #ef4444;
  padding:18px;
  border-radius:16px;
  color:#991b1b;
  margin-bottom:22px;
  font-weight:600;
}

table{
  width:100%;
  border-collapse:collapse;
  border-radius:16px;
  overflow:hidden;
}

thead{
  background:#0f172a;
  color:#fff;
}

th,td{
  padding:16px;
  font-size:15px;
  text-align:center;
}

tbody tr:nth-child(even){
  background:#f8fafc;
}

.pdf{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 18px;
  background:#10b981;
  color:#fff;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
}

.footer{
  text-align:center;
  margin-top:32px;
}

.footer a{
  padding:12px 26px;
  background:#020617;
  color:#fff;
  border-radius:12px;
  text-decoration:none;
  font-weight:500;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
if(!localStorage.getItem('token')) location.href='/login';

const token = localStorage.getItem('token');

function escapeHtml(s){
  if(s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[m]));
}

fetch('/layout.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('app').innerHTML = html;
    const content = document.querySelector('.content');

    content.innerHTML = `
      <div class="card" style="margin:0 auto; max-width:1100px;">
        <h2>🔎 Validar Certificados</h2>
        <div class="subtitle">Ingrese la cédula del estudiante para consultar</div>

        <div class="search">
          <input id="cedula" placeholder="Número de cédula" inputmode="numeric">
          <button onclick="validar()" id="btnValidar">Validar</button>
        </div>

        <div id="resultado" class="mt-4"></div>

        <div class="footer">
          <a href="/dashboard">Volver al panel</a>
        </div>
      </div>
    `;
  });

async function validar(){
  const cedula = (document.getElementById('cedula').value || '').trim();
  if(!cedula) return;

  const cont = document.getElementById('resultado');
  cont.innerHTML = `
    <div class="success" style="background:#eff6ff;border-color:#2563eb;color:#1d4ed8;">
      ⏳ Validando cédula...
    </div>
  `;

  const res = await fetch('/api/validar/' + encodeURIComponent(cedula));
  const data = await res.json();

  cont.innerHTML = '';

  if(!data.valido){
    cont.innerHTML = `
      <div class="error">
        ❌ No se encontraron certificados válidos para <b>${escapeHtml(cedula)}</b>
      </div>
    `;
    return;
  }

  const nombre = escapeHtml(data.estudiante?.nombre || '-');
  const certificados = data.certificados || [];

  cont.innerHTML = `
    <div class="success">
      ✅ Certificados válidos para <b>${nombre}</b>
      <span style="margin-left:auto; font-weight:600; background:#d1fae5; padding:6px 10px; border-radius:999px;">
        ${certificados.length} certificado(s)
      </span>
    </div>

    <table style="margin-top:18px;">
      <thead>
        <tr>
          <th>Curso</th>
          <th>Fecha</th>
          <th>PDF</th>
        </tr>
      </thead>
      <tbody>
        ${certificados.map(c => {
          const fecha = c.fecha_diploma ? escapeHtml(c.fecha_diploma) : '-';
          const curso = c.curso ? escapeHtml(c.curso) : '-';
          const pdf = c.archivo_pdf ? escapeHtml(c.archivo_pdf) : '';
          return `
            <tr>
              <td>${curso}</td>
              <td>${fecha}</td>
              <td>
                ${pdf ? `<a href=\"${pdf}\" target=\"_blank\" class=\"pdf\">Abrir PDF</a>` : '-'}
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}
</script>

</body>
</html>
