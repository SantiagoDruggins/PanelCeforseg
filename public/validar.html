<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Validar Certificados | CEFORSEG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --azul-institucional:#0a3b78;
  --azul-oscuro:#062f5c;
}
*{box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,var(--azul-institucional),var(--azul-oscuro));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
}

.card{
  width:100%;
  max-width:1000px;
  background:#fff;
  border-radius:22px;
  padding:40px;
  box-shadow:0 40px 80px rgba(0,0,0,.3);
}

.brand{
  text-align:center;
  margin-bottom:22px;
}
.logo-wrap{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#fff; /* blanco para que el recuadro del logo no contraste en el fondo azul */
  padding:10px 18px;
  border-radius:16px;
  margin-bottom:14px;
}
.logo-wrap img{
  height:46px;
  width:auto;
  display:block;
}
h2{
  text-align:center;
  margin:0 0 6px 0;
  color:var(--azul-institucional);
  font-weight:800;
  letter-spacing:.2px;
}
.subtitle{
  text-align:center;
  color:#475569;
  margin-bottom:0;
  font-weight:500;
}

.search{
  display:flex;
  gap:14px;
}

.search input{
  flex:1;
  padding:18px;
  font-size:16px;
  border-radius:16px;
  border:1px solid #cbd5e1;
  background:#eef4ff;
}

.search button{
  padding:18px 34px;
  border:none;
  border-radius:16px;
  background:var(--azul-institucional);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.search button:hover{background:var(--azul-oscuro)}

#resultado{margin-top:32px}

.success{
  background:#eff6ff;
  border:1px solid var(--azul-institucional);
  padding:18px;
  border-radius:16px;
  color:var(--azul-institucional);
  margin-bottom:22px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:10px;
}

.error{
  background:#fef2f2;
  border:1px solid #ef4444;
  padding:18px;
  border-radius:16px;
  color:#991b1b;
  margin-bottom:22px;
  font-weight:600;
}

table{
  width:100%;
  border-collapse:collapse;
  border-radius:16px;
  overflow:hidden;
}

thead{
  background:var(--azul-institucional);
  color:#fff;
}

th,td{
  padding:16px;
  font-size:15px;
  text-align:center;
}

tbody tr:nth-child(even){
  background:#f8fafc;
}

.pdf{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 18px;
  background:var(--azul-institucional);
  color:#fff;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
}

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-left:auto;
  font-weight:700;
  background:#e0f2fe;
  border:1px solid rgba(10,59,120,.2);
  padding:6px 10px;
  border-radius:999px;
  color:var(--azul-institucional);
}

.footer{
  text-align:center;
  margin-top:32px;
}

.footer a{
  padding:12px 26px;
  background:var(--azul-institucional);
  color:#fff;
  border-radius:12px;
  text-decoration:none;
  font-weight:500;
}

.footer a:hover{ background:var(--azul-oscuro); }
</style>
</head>

<body>

<div id="app"></div>

<script>
// Página pública (sin layout del panel). Valida certificados por cédula.

function escapeHtml(s){
  if(s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[m]));
}

document.getElementById('app').innerHTML = `
  <div class="card">
    <div class="brand">
      <div class="logo-wrap">
        <img src="/assets/logo.png" alt="CEFORSEG">
      </div>
      <h2>VALIDAR CERTIFICADOS</h2>
      <div class="subtitle">Ingrese la cédula para consultar</div>
    </div>

    <div class="search">
      <input id="cedula" placeholder="Número de cédula" inputmode="numeric">
      <button onclick="validar()" id="btnValidar">Validar</button>
    </div>

    <div id="resultado"></div>

    <div class="footer">
      <a href="/login">Ir al inicio</a>
    </div>
  </div>
`;

async function validar(){
  const cedula = (document.getElementById('cedula').value || '').trim();
  if(!cedula) return;

  const cont = document.getElementById('resultado');
  cont.innerHTML = `
    <div class="success">
      Validando cédula...
    </div>
  `;

  const res = await fetch('/api/validar/' + encodeURIComponent(cedula));
  const data = await res.json();

  cont.innerHTML = '';

  if(!data.valido){
    cont.innerHTML = `
      <div class="error">
        No se encontraron certificados válidos para <b>${escapeHtml(cedula)}</b>.
      </div>
    `;
    return;
  }

  const nombre = escapeHtml(data.estudiante?.nombre || '-');
  const certificados = data.certificados || [];

  cont.innerHTML = `
    <div class="success">
      Certificados válidos para <b>${nombre}</b>
      <span class="badge">
        ${certificados.length} certificado(s)
      </span>
    </div>

    <table style="margin-top:18px;">
      <thead>
        <tr>
          <th>Curso</th>
          <th>Fecha</th>
          <th>PDF</th>
        </tr>
      </thead>
      <tbody>
        ${certificados.map(c => {
          const fecha = c.fecha_diploma ? escapeHtml(c.fecha_diploma) : '-';
          const curso = c.curso ? escapeHtml(c.curso) : '-';
          const pdf = c.archivo_pdf ? escapeHtml(c.archivo_pdf) : '';
          return `
            <tr>
              <td>${curso}</td>
              <td>${fecha}</td>
              <td>
                ${pdf ? `<a href=\"${pdf}\" target=\"_blank\" class=\"pdf\">Abrir PDF</a>` : '-'}
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}
</script>

</body>
</html>
